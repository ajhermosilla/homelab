# RPi 5 full deployment — single-command setup
# Usage: ansible-playbook -i inventory.yml playbooks/rpi5-setup.yml -e "authkey=tskey-xxx"
#
# Runs all three playbooks in the correct order:
#   1. Tailscale (mesh connectivity = backup access if SSH breaks)
#   2. Common (packages, SSH hardening, UFW)
#   3. OpenClaw (Node.js, OpenClaw, systemd service)
#
# Prerequisites:
#   - SD card flashed with Pi OS (hostname: rpi5, user: augusto)
#   - SSH key copied: ssh-copy-id augusto@192.168.0.20
#   - OPNsense DHCP reservation: MAC → 192.168.0.20
#   - Headscale auth key generated (1h expiry)
#
# See docs/plans/rpi5-deployment-plan.md for full checklist.

# =========================================================================
# Step 1: Tailscale — establish mesh connectivity first
# =========================================================================
---
- name: "[RPi 5] Install Tailscale"
  hosts: rpi5
  become: true

  vars:
    headscale_url: "https://hs.cronova.dev"

  tasks:
    - name: Check if Tailscale is installed
      command: which tailscale
      register: tailscale_installed
      ignore_errors: true
      changed_when: false
      check_mode: no

    - name: Download Tailscale install script
      get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/tailscale-install.sh
        mode: '0755'
      when: tailscale_installed.rc != 0

    - name: Install Tailscale
      command: /tmp/tailscale-install.sh
      when: tailscale_installed.rc != 0

    - name: Clean up install script
      file:
        path: /tmp/tailscale-install.sh
        state: absent

    - name: Ensure Tailscale service is running
      service:
        name: tailscaled
        state: started
        enabled: yes

    - name: Check Tailscale status
      command: tailscale status --json
      register: tailscale_status
      changed_when: false
      ignore_errors: true
      check_mode: no

    - name: Parse Tailscale status
      set_fact:
        tailscale_running: "{{ (tailscale_status.rc == 0) and ((tailscale_status.stdout | from_json).BackendState == 'Running') }}"
      when: tailscale_status.rc == 0
      ignore_errors: true

    - name: Connect to Headscale
      command: >
        tailscale up
        --login-server={{ headscale_url }}
        --authkey={{ authkey }}
        --accept-dns=true
        --accept-routes=true
      when:
        - authkey is defined
        - authkey | length > 0
        - not (tailscale_running | default(false))
      register: tailscale_connect

    - name: Display connection result
      debug:
        msg: "Tailscale connected successfully"
      when: tailscale_connect is changed

    - name: Allow Tailscale traffic through UFW
      ufw:
        rule: allow
        interface: tailscale0
        direction: in
      tags: firewall
      ignore_errors: true

    - name: Get Tailscale IP
      command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      check_mode: no

    - name: Display Tailscale IP
      debug:
        msg: "Tailscale IP: {{ tailscale_ip.stdout }} — update SSH config and inventory after deployment"

# =========================================================================
# Step 2: Common — base packages, SSH hardening, UFW
# =========================================================================
- name: "[RPi 5] Common setup"
  hosts: rpi5
  become: true

  vars:
    timezone: "America/Asuncion"
    common_packages:
      - vim
      - git
      - htop
      - curl
      - wget
      - jq
      - ncdu

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: safe
      tags: upgrade

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH
      tags: ssh

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH
      tags: ssh

    - name: Install UFW
      apt:
        name: ufw
        state: present
      tags: firewall

    - name: Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp
      tags: firewall

    - name: Allow Tailscale traffic
      ufw:
        rule: allow
        interface: tailscale0
        direction: in
      tags: firewall

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
      tags: firewall

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted

# =========================================================================
# Step 3: OpenClaw — Node.js + AI assistant gateway
# =========================================================================
- name: "[RPi 5] Install OpenClaw"
  hosts: rpi5
  become: true

  vars:
    node_version: "22"
    openclaw_user: "{{ ansible_user }}"
    openclaw_port: "18789"

  tasks:
    - name: Install Node.js prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download NodeSource GPG key
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Get dpkg architecture
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Verify Node.js version
      command: node --version
      register: node_version_result
      changed_when: false

    - name: Display Node.js version
      debug:
        msg: "Node.js version: {{ node_version_result.stdout }}"

    - name: Install OpenClaw globally
      npm:
        name: openclaw
        global: yes
        state: latest
      become_user: root

    - name: Verify OpenClaw installation
      command: openclaw --version
      register: openclaw_version
      changed_when: false
      ignore_errors: true

    - name: Display OpenClaw version
      debug:
        msg: "OpenClaw version: {{ openclaw_version.stdout | default('Not installed') }}"

    - name: Allow OpenClaw gateway port
      ufw:
        rule: allow
        port: "{{ openclaw_port }}"
        proto: tcp
      tags: firewall

    - name: Create OpenClaw systemd service
      copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw AI Assistant Gateway
          After=network.target

          [Service]
          Type=simple
          User={{ openclaw_user }}
          WorkingDirectory=/home/{{ openclaw_user }}
          ExecStart=/usr/bin/openclaw gateway --port {{ openclaw_port }}
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Reload systemd
      tags: service

    - name: Display next steps
      debug:
        msg: |
          RPi 5 deployment complete!

          Next steps (run manually on rpi5):

          1. Run OpenClaw onboarding:
             openclaw onboard --install-daemon

          2. Configure API keys (from Vaultwarden)

          3. Connect messaging channels:
             openclaw channels login

          4. Enable systemd service:
             sudo systemctl enable --now openclaw

          5. Post-deployment (from MacBook):
             - Update ~/.ssh/config with Tailscale IP
             - Update ansible/inventory.yml with Tailscale IP
             - Add Uptime Kuma monitor
             - Add Pi-hole DNS entry for rpi5.home

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes
