# Restic backup configuration
# Usage: ansible-playbook -i inventory.yml playbooks/backup.yml \
#   -e "restic_repo_user=augusto" \
#   -e "restic_repo_pass=xxx" \
#   -e "restic_password=xxx"

---
- name: Configure Restic backups
  hosts: backup_targets
  become: true

  vars:
    restic_version: "0.16.4"
    backup_server: "{{ nas_lan_ip | default('192.168.0.12') }}"  # NAS IP (from inventory)
    # Repository URL built from components (requires restic_repo_user and restic_repo_pass)
    restic_repository: "rest:http://{{ restic_repo_user }}:{{ restic_repo_pass }}@{{ backup_server }}:8000/{{ inventory_hostname }}"

  tasks:
    # =========================================================================
    # Variable Validation
    # =========================================================================
    - name: Validate required variables
      assert:
        that:
          - restic_repo_user is defined
          - restic_repo_pass is defined
          - restic_password is defined
        fail_msg: |
          Missing required variables. Run with:
            -e "restic_repo_user=<user>" -e "restic_repo_pass=<pass>" -e "restic_password=<encryption_password>"
        success_msg: "All required variables are defined"
      tags: always

    # =========================================================================
    # Restic Installation
    # =========================================================================
    - name: Check if Restic is installed
      command: which restic
      register: restic_installed
      ignore_errors: true
      changed_when: false
      check_mode: no

    - name: Download Restic binary
      get_url:
        url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}.bz2"
        dest: /tmp/restic.bz2
        mode: '0644'
      when: restic_installed.rc != 0

    - name: Extract Restic binary
      command: bunzip2 -f /tmp/restic.bz2
      when: restic_installed.rc != 0

    - name: Install Restic binary
      copy:
        src: /tmp/restic
        dest: /usr/local/bin/restic
        mode: '0755'
        remote_src: yes
      when: restic_installed.rc != 0

    - name: Clean up download
      file:
        path: /tmp/restic
        state: absent

    # =========================================================================
    # Configuration
    # =========================================================================
    - name: Create Restic config directory
      file:
        path: /etc/restic
        state: directory
        mode: '0700'

    - name: Create Restic password file
      copy:
        content: "{{ restic_password }}"
        dest: /etc/restic/password
        mode: '0600'
      when: restic_password is defined
      no_log: true

    - name: Create Restic environment file
      copy:
        dest: /etc/restic/env
        content: |
          export RESTIC_REPOSITORY="{{ restic_repository }}"
          export RESTIC_PASSWORD_FILE=/etc/restic/password
        mode: '0600'
      when: restic_repo_user is defined and restic_repo_pass is defined
      no_log: true

    # =========================================================================
    # Repository Initialization
    # =========================================================================
    - name: Check if repository exists
      shell: |
        source /etc/restic/env
        restic snapshots 2>/dev/null
      register: repo_check
      ignore_errors: true
      changed_when: false
      when: restic_password is defined

    - name: Initialize Restic repository
      shell: |
        source /etc/restic/env
        restic init
      when:
        - restic_password is defined
        - repo_check.rc != 0
      tags: init

    # =========================================================================
    # Backup Script
    # =========================================================================
    - name: Create backup script
      copy:
        dest: /usr/local/bin/backup-homelab
        mode: '0755'
        content: |
          #!/bin/bash
          # Homelab backup script
          # Generated by Ansible

          set -e
          source /etc/restic/env

          BACKUP_PATHS="${BACKUP_PATHS:-/etc /var/lib/docker/volumes}"
          EXCLUDE_PATTERNS="--exclude='*.log' --exclude='*.tmp' --exclude='cache'"

          echo "$(date) - Starting backup..."

          # Run backup
          restic backup $BACKUP_PATHS $EXCLUDE_PATTERNS --tag {{ inventory_hostname }}

          # Prune old snapshots
          restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune

          # Notify on completion (if ntfy available)
          if command -v curl &> /dev/null; then
            curl -s -d "Backup completed on {{ inventory_hostname }}" \
              https://notify.cronova.dev/cronova-info 2>/dev/null || true
          fi

          echo "$(date) - Backup completed"
      tags: script

    # =========================================================================
    # Cron Schedule
    # =========================================================================
    - name: Schedule daily backup
      cron:
        name: "Restic backup"
        hour: "3"
        minute: "0"
        job: "/usr/local/bin/backup-homelab >> /var/log/backup.log 2>&1"
      tags: cron

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Verify Restic installation
      command: restic version
      register: restic_version_output
      changed_when: false
      check_mode: no

    - name: Display Restic version
      debug:
        msg: "{{ restic_version_output.stdout }}"
