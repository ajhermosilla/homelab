# NFS server configuration
# Usage: ansible-playbook -i inventory.yml playbooks/nfs-server.yml -l nas
# Options:
#   -e "nfs_network=192.168.1.0/24" - Override allowed network
#   -e "docker_vm_ip=192.168.1.10" - Override Docker VM IP for Frigate

---
- name: Configure NFS server
  hosts: nas
  become: true

  vars:
    # Base mount points on NAS (per docs/fixed-homelab.md)
    nfs_data_root: "/mnt/data"      # WD Red Plus 8TB
    nfs_purple_root: "/mnt/purple"  # WD Purple 2TB (Frigate)
    # Network settings
    nfs_network: "192.168.1.0/24"
    docker_vm_ip: "192.168.1.10"
    # Owner/group for directories (default: current user UID/GID)
    nfs_owner: "1000"
    nfs_group: "1000"
    # Export definitions using base paths
    nfs_exports:
      - path: "{{ nfs_data_root }}/media"
        clients: "{{ nfs_network }}"
        options: "ro,sync,no_subtree_check"
        ensure_exists: true
      - path: "{{ nfs_data_root }}/downloads"
        clients: "{{ nfs_network }}"
        options: "rw,sync,no_subtree_check"
        ensure_exists: true
      - path: "{{ nfs_purple_root }}/frigate"
        clients: "{{ docker_vm_ip }}"
        options: "rw,sync,no_subtree_check,no_root_squash"
        ensure_exists: true
      - path: "{{ nfs_data_root }}/backups"
        clients: "{{ nfs_network }}"
        options: "rw,sync,no_subtree_check"
        ensure_exists: true

  tasks:
    # =========================================================================
    # Validate Mount Points
    # =========================================================================
    - name: Check if data mount exists
      stat:
        path: "{{ nfs_data_root }}"
      register: data_mount

    - name: Check if purple mount exists
      stat:
        path: "{{ nfs_purple_root }}"
      register: purple_mount

    - name: Warn if mount points don't exist
      debug:
        msg: |
          WARNING: Base mount points not found. Ensure drives are mounted:
          - {{ nfs_data_root }}: {{ 'EXISTS' if data_mount.stat.exists else 'MISSING' }}
          - {{ nfs_purple_root }}: {{ 'EXISTS' if purple_mount.stat.exists else 'MISSING' }}

          Check /etc/fstab and run: sudo mount -a
      when: not data_mount.stat.exists or not purple_mount.stat.exists

    # =========================================================================
    # Installation
    # =========================================================================
    - name: Install NFS server packages
      apt:
        name:
          - nfs-kernel-server
          - nfs-common
        state: present
        update_cache: yes

    # =========================================================================
    # Directory Setup
    # =========================================================================
    - name: Create export directories
      file:
        path: "{{ item.path }}"
        state: directory
        mode: '0755'
        owner: "{{ nfs_owner | default('1000') }}"
        group: "{{ nfs_group | default('1000') }}"
      loop: "{{ nfs_exports }}"
      tags: directories

    # =========================================================================
    # NFS Configuration
    # =========================================================================
    - name: Configure NFS exports
      template:
        dest: /etc/exports
        content: |
          # NFS Exports - Managed by Ansible
          # Run 'exportfs -ra' after manual changes

          {% for export in nfs_exports %}
          {{ export.path }} {{ export.clients }}({{ export.options }})
          {% endfor %}
        mode: '0644'
        backup: yes
      notify: Reload NFS exports

    # =========================================================================
    # Service
    # =========================================================================
    - name: Enable and start NFS server
      service:
        name: nfs-kernel-server
        state: started
        enabled: yes

    # =========================================================================
    # Firewall
    # =========================================================================
    - name: Allow NFS traffic from local network
      ufw:
        rule: allow
        from_ip: "192.168.1.0/24"
        port: "{{ item }}"
        proto: tcp
      loop:
        - "111"   # rpcbind
        - "2049"  # NFS
      tags: firewall

    - name: Allow NFS UDP traffic
      ufw:
        rule: allow
        from_ip: "192.168.1.0/24"
        port: "{{ item }}"
        proto: udp
      loop:
        - "111"
        - "2049"
      tags: firewall

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Verify exports
      command: exportfs -v
      register: exports_output
      changed_when: false
      tags: verify

    - name: Display configured exports
      debug:
        msg: "{{ exports_output.stdout_lines }}"
      tags: verify

    - name: Check NFS server status
      command: systemctl status nfs-kernel-server
      register: nfs_status
      changed_when: false
      tags: verify

    - name: Display status
      debug:
        msg: |
          NFS server configured successfully!
          Exports:
          {% for export in nfs_exports %}
          - {{ export.path }} -> {{ export.clients }}
          {% endfor %}

          Mount from client:
            sudo mount -t nfs {{ ansible_host }}:/srv/media /mnt/media

  handlers:
    - name: Reload NFS exports
      command: exportfs -ra
