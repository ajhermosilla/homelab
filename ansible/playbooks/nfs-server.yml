# NFS server configuration
# Usage: ansible-playbook -i inventory.yml playbooks/nfs-server.yml -l nas
# Options:
#   -e "nfs_network=192.168.1.0/24" - Override allowed network
#   -e "docker_vm_ip=192.168.1.10" - Override Docker VM IP for Frigate
#
# Prerequisites:
#   1. Drives mounted at /mnt/red8 and /mnt/purple
#   2. Symlinks created in /srv/ (see docs/nas-deployment-plan.md)
#   3. Tailscale connected (run tailscale.yml first)

---
- name: Configure NFS server
  hosts: nas
  become: true

  vars:
    # Base mount points on NAS (per docs/nas-deployment-plan.md)
    nfs_red8_root: "/mnt/red8"      # WD Red Plus 8TB
    nfs_purple_root: "/mnt/purple"  # WD Purple 2TB (Frigate)
    # Symlink root (exports use /srv/ for cleaner paths)
    nfs_srv_root: "/srv"
    # Network settings
    nfs_network: "192.168.1.0/24"
    docker_vm_ip: "192.168.1.10"
    # Owner/group for directories (default: current user UID/GID)
    nfs_owner: "1000"
    nfs_group: "1000"
    # Export definitions using /srv/ symlinks for cleaner client mounts
    nfs_exports:
      - path: "{{ nfs_srv_root }}/media"
        clients: "{{ nfs_network }}"
        # no_root_squash omitted: read-only mount, root access unnecessary
        options: "ro,sync,no_subtree_check"
        ensure_exists: false  # symlink to /mnt/red8/media
      - path: "{{ nfs_srv_root }}/downloads"
        clients: "{{ nfs_network }}"
        options: "rw,sync,no_subtree_check"
        ensure_exists: false  # symlink to /mnt/red8/downloads
      - path: "{{ nfs_srv_root }}/frigate"
        clients: "{{ docker_vm_ip }}"
        options: "rw,sync,no_subtree_check,no_root_squash"
        ensure_exists: false  # symlink to /mnt/purple/frigate
      - path: "{{ nfs_srv_root }}/backup"
        clients: "{{ nfs_network }}"
        options: "rw,sync,no_subtree_check"
        ensure_exists: false  # symlink to /mnt/red8/backup

  tasks:
    # =========================================================================
    # Validate Mount Points
    # =========================================================================
    - name: Check if red8 mount exists
      stat:
        path: "{{ nfs_red8_root }}"
      register: red8_mount

    - name: Check if purple mount exists
      stat:
        path: "{{ nfs_purple_root }}"
      register: purple_mount

    - name: Check if /srv symlinks exist
      stat:
        path: "{{ nfs_srv_root }}"
      register: srv_dir

    - name: Fail if mount points don't exist
      fail:
        msg: |
          ERROR: Base mount points not found. Ensure drives are mounted:
          - {{ nfs_red8_root }}: {{ 'EXISTS' if red8_mount.stat.exists else 'MISSING' }}
          - {{ nfs_purple_root }}: {{ 'EXISTS' if purple_mount.stat.exists else 'MISSING' }}
          - {{ nfs_srv_root }}: {{ 'EXISTS' if srv_dir.stat.exists else 'MISSING' }}

          Setup steps:
          1. Mount drives: sudo mount -a (check /etc/fstab)
          2. Create symlinks:
             sudo ln -s /mnt/red8/media /srv/media
             sudo ln -s /mnt/red8/downloads /srv/downloads
             sudo ln -s /mnt/red8/backup /srv/backup
             sudo ln -s /mnt/purple/frigate /srv/frigate

          See docs/nas-deployment-plan.md for full setup.
      when: not red8_mount.stat.exists or not purple_mount.stat.exists

    # =========================================================================
    # Installation
    # =========================================================================
    - name: Install NFS server packages
      apt:
        name:
          - nfs-kernel-server
          - nfs-common
        state: present
        update_cache: yes

    # =========================================================================
    # Directory Setup - Create /srv symlinks
    # =========================================================================
    - name: Ensure /srv directory exists
      file:
        path: "{{ nfs_srv_root }}"
        state: directory
        mode: '0755'
      tags: directories

    - name: Create /srv/media symlink
      file:
        src: "{{ nfs_red8_root }}/media"
        dest: "{{ nfs_srv_root }}/media"
        state: link
      when: red8_mount.stat.exists
      ignore_errors: true
      tags: directories

    - name: Create /srv/downloads symlink
      file:
        src: "{{ nfs_red8_root }}/downloads"
        dest: "{{ nfs_srv_root }}/downloads"
        state: link
      when: red8_mount.stat.exists
      ignore_errors: true
      tags: directories

    - name: Create /srv/backup symlink
      file:
        src: "{{ nfs_red8_root }}/backup"
        dest: "{{ nfs_srv_root }}/backup"
        state: link
      when: red8_mount.stat.exists
      ignore_errors: true
      tags: directories

    - name: Create /srv/frigate symlink
      file:
        src: "{{ nfs_purple_root }}/frigate"
        dest: "{{ nfs_srv_root }}/frigate"
        state: link
      when: purple_mount.stat.exists
      ignore_errors: true
      tags: directories

    # =========================================================================
    # Verify Symlinks
    # =========================================================================
    - name: Verify export paths exist (symlinks or directories)
      stat:
        path: "{{ item.path }}"
      loop: "{{ nfs_exports }}"
      register: export_paths
      tags: directories

    - name: Warn about missing export paths
      debug:
        msg: "WARNING: Export path {{ item.item.path }} does not exist. Check symlink target directories."
      loop: "{{ export_paths.results }}"
      when: not item.stat.exists
      tags: directories

    - name: Set ownership on export paths
      file:
        path: "{{ item.path }}"
        owner: "{{ nfs_owner | default('1000') }}"
        group: "{{ nfs_group | default('1000') }}"
        follow: yes  # Follow symlinks to set ownership on target
      loop: "{{ nfs_exports }}"
      ignore_errors: true  # May fail if symlink target doesn't exist
      tags: directories

    # =========================================================================
    # NFS Configuration
    # =========================================================================
    - name: Configure NFS exports
      template:
        dest: /etc/exports
        content: |
          # NFS Exports - Managed by Ansible
          # Run 'exportfs -ra' after manual changes

          {% for export in nfs_exports %}
          {{ export.path }} {{ export.clients }}({{ export.options }})
          {% endfor %}
        mode: '0644'
        backup: yes
      notify: Reload NFS exports

    # =========================================================================
    # Service
    # =========================================================================
    - name: Enable and start NFS server
      service:
        name: nfs-kernel-server
        state: started
        enabled: yes

    # =========================================================================
    # Firewall
    # =========================================================================
    - name: Allow NFS traffic from local network
      ufw:
        rule: allow
        from_ip: "192.168.1.0/24"
        port: "{{ item }}"
        proto: tcp
      loop:
        - "111"   # rpcbind
        - "2049"  # NFS
      tags: firewall

    - name: Allow NFS UDP traffic
      ufw:
        rule: allow
        from_ip: "192.168.1.0/24"
        port: "{{ item }}"
        proto: udp
      loop:
        - "111"
        - "2049"
      tags: firewall

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Verify exports
      command: exportfs -v
      register: exports_output
      changed_when: false
      tags: verify

    - name: Display configured exports
      debug:
        msg: "{{ exports_output.stdout_lines }}"
      tags: verify

    - name: Check NFS server status
      command: systemctl status nfs-kernel-server
      register: nfs_status
      changed_when: false
      tags: verify

    - name: Display status
      debug:
        msg: |
          NFS server configured successfully!
          Exports:
          {% for export in nfs_exports %}
          - {{ export.path }} -> {{ export.clients }}
          {% endfor %}

          Mount from Docker VM (192.168.1.10):
            sudo mount -t nfs 192.168.1.12:/srv/frigate /mnt/nas/frigate
            sudo mount -t nfs 192.168.1.12:/srv/media /mnt/nas/media
            sudo mount -t nfs 192.168.1.12:/srv/downloads /mnt/nas/downloads

  handlers:
    - name: Reload NFS exports
      command: exportfs -ra
