# Monitoring stack deployment (Uptime Kuma + ntfy)
# Usage: ansible-playbook -i inventory.yml playbooks/monitoring.yml -l vps

---
- name: Deploy monitoring stack
  hosts: vps
  become: true

  vars:
    monitoring_compose_dir: /opt/homelab/monitoring
    homelab_repo: "{{ homelab_repo | default('https://git.cronova.dev/augusto/homelab.git') }}"
    homelab_base: /opt/homelab

  tasks:
    # =========================================================================
    # Prerequisites
    # =========================================================================
    - name: Ensure Docker is running
      service:
        name: docker
        state: started

    - name: Create monitoring directory
      file:
        path: "{{ monitoring_compose_dir }}"
        state: directory
        mode: '0755'

    # =========================================================================
    # Clone/Update Homelab Repo
    # =========================================================================
    - name: Clone/update homelab repository
      git:
        repo: "{{ homelab_repo }}"
        dest: "{{ homelab_base }}/repo"
        version: main
        force: yes
      tags: clone
      ignore_errors: true

    # =========================================================================
    # Create Docker Network
    # =========================================================================
    - name: Create monitoring-net network
      community.docker.docker_network:
        name: monitoring-net
        state: present
      tags: networks

    # =========================================================================
    # Copy Docker Compose Files from Repo
    # =========================================================================
    - name: Copy docker-compose.yml from repo
      copy:
        src: "{{ homelab_base }}/repo/docker/vps/monitoring/docker-compose.yml"
        dest: "{{ monitoring_compose_dir }}/docker-compose.yml"
        remote_src: yes
        mode: '0644'

    - name: Copy shared common.env
      copy:
        src: "{{ homelab_base }}/repo/docker/shared/common.env"
        dest: "{{ monitoring_compose_dir }}/common.env"
        remote_src: yes
        mode: '0644'
      ignore_errors: true

    - name: Create .env file
      copy:
        dest: "{{ monitoring_compose_dir }}/.env"
        content: |
          # Monitoring Configuration - Generated by Ansible
          TZ={{ timezone | default('UTC') }}
        mode: '0644'

    # =========================================================================
    # Deploy Stack
    # =========================================================================
    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: "{{ monitoring_compose_dir }}"
      changed_when: true
      tags: pull

    - name: Start monitoring stack
      command: docker compose up -d
      args:
        chdir: "{{ monitoring_compose_dir }}"
      register: compose_up

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Wait for Uptime Kuma to be healthy
      uri:
        url: "http://localhost:3001/"
        status_code: 200
      register: uptime_kuma_health
      until: uptime_kuma_health.status == 200
      retries: 10
      delay: 5
      tags: verify

    - name: Wait for ntfy to be healthy
      uri:
        url: "http://localhost:8080/"
        status_code: 200
      register: ntfy_health
      until: ntfy_health.status == 200
      retries: 10
      delay: 5
      tags: verify

    - name: Display status
      debug:
        msg: |
          Monitoring stack deployed successfully!
          - Uptime Kuma: http://localhost:3001 (https://status.cronova.dev via Caddy)
          - ntfy: http://localhost:8080 (https://notify.cronova.dev via Caddy)

          Next steps:
          1. Create admin account in Uptime Kuma on first visit
          2. Configure ntfy user:
             docker exec -it ntfy ntfy user add --role=admin augusto
             docker exec -it ntfy ntfy access augusto '*' rw
