# Maintenance stack deployment (Watchtower)
# Usage: ansible-playbook -i inventory.yml playbooks/maintenance.yml -l docker
# Options:
#   -e "watchtower_schedule='0 0 4 * * 0'" - Override update schedule (default: 4 AM Sundays)
#   -e "watchtower_monitor_only=true" - Only check for updates, don't apply

---
- name: Deploy Watchtower maintenance stack
  hosts: docker_vm
  become: true

  vars:
    maintenance_compose_dir: /opt/homelab/maintenance
    homelab_repo: "{{ homelab_repo | default('https://git.cronova.dev/augusto/homelab.git') }}"
    homelab_base: /opt/homelab
    # Watchtower settings
    watchtower_schedule: "0 0 4 * * 0"  # 4 AM every Sunday
    watchtower_monitor_only: "false"
    # Notification settings (optional)
    watchtower_notifications: ""
    watchtower_notification_url: ""

  tasks:
    # =========================================================================
    # Prerequisites
    # =========================================================================
    - name: Ensure Docker is running
      service:
        name: docker
        state: started

    - name: Create maintenance directory
      file:
        path: "{{ maintenance_compose_dir }}"
        state: directory
        mode: '0755'

    # =========================================================================
    # Clone/Update Homelab Repo
    # =========================================================================
    - name: Clone/update homelab repository
      git:
        repo: "{{ homelab_repo }}"
        dest: "{{ homelab_base }}/repo"
        version: main
        force: yes
      tags: clone
      ignore_errors: true

    # =========================================================================
    # Copy Docker Compose Files
    # =========================================================================
    - name: Copy docker-compose.yml from repo
      copy:
        src: "{{ homelab_base }}/repo/docker/fixed/docker-vm/maintenance/docker-compose.yml"
        dest: "{{ maintenance_compose_dir }}/docker-compose.yml"
        remote_src: yes
        mode: '0644'
      when: homelab_base is defined

    - name: Copy shared common.env
      copy:
        src: "{{ homelab_base }}/repo/docker/shared/common.env"
        dest: "{{ maintenance_compose_dir }}/common.env"
        remote_src: yes
        mode: '0644'
      ignore_errors: true

    # =========================================================================
    # Environment Configuration
    # =========================================================================
    - name: Create .env file
      copy:
        dest: "{{ maintenance_compose_dir }}/.env"
        content: |
          # Watchtower Configuration - Generated by Ansible
          TZ={{ timezone | default('America/Asuncion') }}

          # Update schedule (cron: second minute hour day month weekday)
          WATCHTOWER_SCHEDULE={{ watchtower_schedule }}

          # Monitor-only mode (true = check but don't update)
          WATCHTOWER_MONITOR_ONLY={{ watchtower_monitor_only }}

          # Notifications (optional)
          WATCHTOWER_NOTIFICATIONS={{ watchtower_notifications }}
          WATCHTOWER_NOTIFICATION_URL={{ watchtower_notification_url }}
        mode: '0644'

    # =========================================================================
    # Deploy
    # =========================================================================
    - name: Pull Watchtower image
      command: docker compose pull
      args:
        chdir: "{{ maintenance_compose_dir }}"
      changed_when: true
      tags: pull

    - name: Start Watchtower
      command: docker compose up -d
      args:
        chdir: "{{ maintenance_compose_dir }}"
      register: watchtower_up

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Wait for Watchtower to start
      command: docker ps --filter "name=watchtower" --format "{% raw %}{{.Status}}{% endraw %}"
      register: watchtower_status
      until: "'Up' in watchtower_status.stdout"
      retries: 10
      delay: 3
      changed_when: false
      tags: verify

    - name: Get Watchtower logs
      command: docker logs --tail 10 watchtower
      register: watchtower_logs
      changed_when: false
      tags: verify

    - name: Display status
      debug:
        msg: |
          Watchtower deployed successfully!

          Schedule: {{ watchtower_schedule }}
          Monitor-only: {{ watchtower_monitor_only }}

          Recent logs:
          {{ watchtower_logs.stdout }}

          To force an update check:
            docker exec watchtower /watchtower --run-once

          To update a specific container:
            docker exec watchtower /watchtower --run-once <container-name>

          Remember to add this label to containers for auto-updates:
            labels:
              - "com.centurylinklabs.watchtower.enable=true"
