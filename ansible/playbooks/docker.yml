# Docker installation and configuration
# Usage: ansible-playbook -i inventory.yml playbooks/docker.yml

---
- name: Install and configure Docker
  hosts: docker_hosts
  become: true

  vars:
    docker_users:
      - augusto

  tasks:
    # =========================================================================
    # Prerequisites
    # =========================================================================
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    # =========================================================================
    # Docker Repository
    # =========================================================================
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    # =========================================================================
    # Docker Installation
    # =========================================================================
    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    # =========================================================================
    # User Configuration
    # =========================================================================
    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    # =========================================================================
    # Docker Configuration
    # =========================================================================
    - name: Create Docker daemon config directory
      file:
        path: /etc/docker
        state: directory
        mode: '0755'

    - name: Configure Docker daemon
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2"
          }
        mode: '0644'
      notify: Restart Docker

    # =========================================================================
    # Firewall Rules
    # =========================================================================
    - name: Allow Docker Swarm (if needed)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '2377'
        - '7946'
      tags: firewall
      when: docker_swarm | default(false)

    # =========================================================================
    # Cleanup
    # =========================================================================
    - name: Prune Docker system (optional)
      command: docker system prune -af
      tags: cleanup
      when: docker_prune | default(false)

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted
