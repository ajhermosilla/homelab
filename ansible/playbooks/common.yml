# Common setup tasks for all hosts
# Usage: ansible-playbook -i inventory.yml playbooks/common.yml

---
- name: Common setup for all hosts
  hosts: all
  become: true
  vars:
    common_packages:
      - vim
      - git
      - htop
      - curl
      - wget
      - jq
      - ncdu

  tasks:
    # =========================================================================
    # System Updates
    # =========================================================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages
      apt:
        upgrade: safe
      when: ansible_os_family == "Debian"
      tags: upgrade

    # =========================================================================
    # Common Packages
    # =========================================================================
    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present
      when: ansible_os_family == "Debian"

    # =========================================================================
    # Timezone
    # =========================================================================
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"
      when: timezone is defined

    # =========================================================================
    # SSH Hardening
    # =========================================================================
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH
      tags: ssh

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH
      tags: ssh

    # =========================================================================
    # Firewall (UFW)
    # =========================================================================
    - name: Install UFW
      apt:
        name: ufw
        state: present
      when: ansible_os_family == "Debian"
      tags: firewall

    - name: Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp
      tags: firewall

    - name: Check if Tailscale interface exists
      stat:
        path: /sys/class/net/tailscale0
      register: tailscale_interface
      tags: firewall

    - name: Allow Tailscale traffic
      ufw:
        rule: allow
        interface: tailscale0
        direction: in
      when: tailscale_interface.stat.exists
      tags: firewall

    - name: Note about Tailscale firewall rule
      debug:
        msg: "Tailscale interface not found - skipping firewall rule. Run tailscale.yml first."
      when: not tailscale_interface.stat.exists
      tags: firewall

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
      tags: firewall

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
