# Pi-hole deployment via Docker
# Usage: ansible-playbook -i inventory.yml playbooks/pihole.yml -l pihole_hosts -e "webpassword=xxx"
# REQUIRED: -e "webpassword=xxx" - Set admin password (will fail without it)

---
- name: Deploy Pi-hole
  hosts: pihole_hosts
  become: true

  vars:
    pihole_compose_dir: /opt/homelab/pihole
    pihole_dns_port: "53"
    pihole_web_port: "8053"
    pihole_upstream_dns:
      - "1.1.1.1"
      - "9.9.9.9"

  tasks:
    # =========================================================================
    # Variable Validation
    # =========================================================================
    - name: Validate webpassword is provided
      assert:
        that:
          - webpassword is defined
          - webpassword | length > 0
        fail_msg: |
          Pi-hole admin password is required for security.
          Run with: -e "webpassword=<your-secure-password>"
        success_msg: "Admin password provided"
      tags: always

    # =========================================================================
    # Prerequisites
    # =========================================================================
    - name: Ensure Docker is running
      service:
        name: docker
        state: started

    - name: Install dnsutils for dig command
      apt:
        name: dnsutils
        state: present

    - name: Create Pi-hole directory
      file:
        path: "{{ pihole_compose_dir }}"
        state: directory
        mode: '0755'

    # =========================================================================
    # Disable systemd-resolved (conflicts with Pi-hole on port 53)
    # =========================================================================
    - name: Check if systemd-resolved is running
      command: systemctl is-active systemd-resolved
      register: resolved_status
      ignore_errors: true
      changed_when: false
      check_mode: no

    - name: Stop systemd-resolved
      service:
        name: systemd-resolved
        state: stopped
        enabled: no
      when: resolved_status.rc is defined and resolved_status.rc == 0
      ignore_errors: true
      tags: resolved

    - name: Update resolv.conf
      copy:
        dest: /etc/resolv.conf
        content: |
          # Generated by Ansible for Pi-hole
          nameserver 1.1.1.1
          nameserver 9.9.9.9
        mode: '0644'
      when: resolved_status.rc is defined and resolved_status.rc == 0
      tags: resolved

    # =========================================================================
    # Docker Compose
    # =========================================================================
    - name: Create docker-compose.yml
      copy:
        dest: "{{ pihole_compose_dir }}/docker-compose.yml"
        content: |
          # Pi-hole DNS ad-blocking
          # Deployed by Ansible (host network mode for LAN DNS access)

          services:
            pihole:
              image: pihole/pihole:latest
              container_name: pihole
              restart: unless-stopped
              network_mode: host
              cap_add:
                - NET_ADMIN
                - NET_BIND_SERVICE
                - NET_RAW
                - CHOWN
              labels:
                - "com.cronova.environment={{ environment_type | default('fixed') }}"
                - "com.cronova.category=networking"
                - "com.cronova.critical=true"
              deploy:
                resources:
                  limits:
                    memory: 256M
                    cpus: '0.5'
              volumes:
                - pihole-config:/etc/pihole
                - pihole-dnsmasq:/etc/dnsmasq.d
              environment:
                - TZ={{ timezone | default('America/Asuncion') }}
                - WEBPASSWORD={{ webpassword | default('') }}
                - PIHOLE_DNS_={{ pihole_upstream_dns | join(';') }}
                - DNSMASQ_LISTENING=all
                - FTLCONF_webserver_port={{ pihole_web_port }}
              logging:
                driver: "json-file"
                options:
                  max-size: "10m"
                  max-file: "3"

          volumes:
            pihole-config:
              name: pihole-config
            pihole-dnsmasq:
              name: pihole-dnsmasq
        mode: '0644'

    # =========================================================================
    # Firewall
    # =========================================================================
    - name: Allow DNS traffic
      ufw:
        rule: allow
        port: "{{ pihole_dns_port }}"
        proto: "{{ item }}"
      loop:
        - tcp
        - udp
      tags: firewall

    - name: Allow Pi-hole web UI
      ufw:
        rule: allow
        port: "{{ pihole_web_port }}"
        proto: tcp
      tags: firewall

    # =========================================================================
    # Deploy
    # =========================================================================
    - name: Pull Pi-hole image
      command: docker compose pull
      args:
        chdir: "{{ pihole_compose_dir }}"
      changed_when: true
      tags: pull

    - name: Start Pi-hole
      command: docker compose up -d
      args:
        chdir: "{{ pihole_compose_dir }}"
      register: pihole_up

    # =========================================================================
    # Verification
    # =========================================================================
    - name: Wait for Pi-hole to be ready
      uri:
        url: "http://localhost:{{ pihole_web_port }}/"
        status_code: [200, 302]
        follow_redirects: none
      register: pihole_health
      until: pihole_health.status in [200, 302]
      retries: 12
      delay: 5
      tags: verify

    - name: Test DNS resolution
      command: dig @127.0.0.1 google.com +short
      register: dns_test
      changed_when: false
      tags: verify

    - name: Display status
      debug:
        msg: |
          Pi-hole deployed successfully!
          - Web UI: http://{{ ansible_host }}:{{ pihole_web_port }}/admin/
          - DNS: {{ ansible_host }}:{{ pihole_dns_port }}
          - Test: {{ dns_test.stdout }}
