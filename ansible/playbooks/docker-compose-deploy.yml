# Deploy Docker Compose stacks from homelab repo
# Usage: ansible-playbook -i inventory.yml playbooks/docker-compose-deploy.yml -l docker
# Options:
#   -e "stack=media" - Deploy specific stack
#   -e "compose_action=down" - Stop stack
#   -e "compose_action=restart" - Restart stack

---
- name: Deploy Docker Compose stacks
  hosts: docker_hosts
  become: true

  vars:
    homelab_base: /opt/homelab
    homelab_repo: "https://github.com/ajhermosilla/homelab.git"
    compose_action: "up"  # up, down, restart, pull
    # Stack base paths per environment
    # Structure: docker/<environment>/<host_subdir>/<stack>
    stack_paths:
      vps: "vps"                    # docker/vps/<stack>
      docker_vm: "fixed/docker-vm"  # docker/fixed/docker-vm/<stack>
      storage: "fixed/nas"          # docker/fixed/nas/<stack>
      mobile: "mobile/rpi5"         # docker/mobile/rpi5/<stack>
    # Available stacks per host type:
    vps_stacks:
      - networking/headscale
      - networking/caddy
      - networking/derp
      - networking/pihole
      - monitoring
      - scraping
      - backup
    docker_vm_stacks:
      - networking/pihole
      - networking/caddy
      - media
      - automation
      - security
      - maintenance
    storage_stacks:
      - storage
      - backup

  tasks:
    # =========================================================================
    # Setup
    # =========================================================================
    - name: Create homelab directory
      file:
        path: "{{ homelab_base }}"
        state: directory
        mode: '0755'

    - name: Clone/update homelab repository
      git:
        repo: "{{ homelab_repo }}"
        dest: "{{ homelab_base }}/repo"
        version: main
        force: yes
      tags: clone
      ignore_errors: true  # May fail if repo is private

    # =========================================================================
    # Determine stacks to deploy
    # =========================================================================
    - name: Set stacks and path for VPS
      set_fact:
        deploy_stacks: "{{ [stack] if stack is defined else vps_stacks }}"
        stack_base_path: "{{ stack_paths.vps }}"
      when: "'vps' in group_names"

    - name: Set stacks and path for Docker VM
      set_fact:
        deploy_stacks: "{{ [stack] if stack is defined else docker_vm_stacks }}"
        stack_base_path: "{{ stack_paths.docker_vm }}"
      when: "'docker_vm' in group_names"

    - name: Set stacks and path for NAS
      set_fact:
        deploy_stacks: "{{ [stack] if stack is defined else storage_stacks }}"
        stack_base_path: "{{ stack_paths.storage }}"
      when: "'storage' in group_names"

    # =========================================================================
    # Stack-Specific Validation
    # =========================================================================
    - name: Check if deploying automation stack
      set_fact:
        deploying_automation: "{{ 'automation' in deploy_stacks | default([]) }}"
      when: stack_base_path is defined

    - name: Verify mosquitto.conf exists for automation stack
      stat:
        path: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}/automation/mosquitto.conf"
      register: mosquitto_conf
      when: deploying_automation | default(false)

    - name: Fail if mosquitto.conf missing
      fail:
        msg: |
          ERROR: mosquitto.conf not found for automation stack.
          Expected at: {{ homelab_base }}/repo/docker/{{ stack_base_path }}/automation/mosquitto.conf

          Create mosquitto.conf from the repo or copy from example.
      when:
        - deploying_automation | default(false)
        - not mosquitto_conf.stat.exists | default(false)

    - name: Note about Mosquitto password setup
      debug:
        msg: |
          NOTE: After deploying automation stack, create Mosquitto users:
            docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/password.txt homeassistant
            docker exec -it mosquitto mosquitto_passwd -b /mosquitto/config/password.txt frigate <password>
            docker compose restart mosquitto
      when: deploying_automation | default(false)

    # =========================================================================
    # Pull Images
    # =========================================================================
    - name: Pull images for stacks
      command: docker compose pull
      args:
        chdir: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}/{{ item }}"
      loop: "{{ deploy_stacks | default([]) }}"
      when: compose_action in ['up', 'pull'] and stack_base_path is defined
      ignore_errors: true
      tags: pull

    # =========================================================================
    # Deploy Stacks
    # =========================================================================
    - name: Start stacks (up)
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}/{{ item }}"
      loop: "{{ deploy_stacks | default([]) }}"
      when: compose_action == 'up' and stack_base_path is defined
      register: compose_up
      tags: deploy

    - name: Stop stacks (down)
      command: docker compose down
      args:
        chdir: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}/{{ item }}"
      loop: "{{ deploy_stacks | default([]) }}"
      when: compose_action == 'down' and stack_base_path is defined
      tags: deploy

    - name: Restart stacks
      command: docker compose restart
      args:
        chdir: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}/{{ item }}"
      loop: "{{ deploy_stacks | default([]) }}"
      when: compose_action == 'restart' and stack_base_path is defined
      tags: deploy

    # =========================================================================
    # Copy Environment Files
    # =========================================================================
    - name: Check for .env.example files
      find:
        paths: "{{ homelab_base }}/repo/docker/{{ stack_base_path }}"
        patterns: ".env.example"
        recurse: yes
      register: env_examples
      when: stack_base_path is defined
      tags: env

    - name: Create .env from .env.example (if not exists)
      copy:
        src: "{{ item.path }}"
        dest: "{{ item.path | dirname }}/.env"
        remote_src: yes
        force: no  # Don't overwrite existing
      loop: "{{ env_examples.files }}"
      tags: env

    # =========================================================================
    # Status
    # =========================================================================
    - name: Get container status
      command: docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
      register: docker_ps
      changed_when: false
      tags: status

    - name: Display container status
      debug:
        msg: "{{ docker_ps.stdout_lines }}"
      tags: status

    # =========================================================================
    # Health Checks
    # =========================================================================
    - name: Check container health
      command: docker ps --filter "health=unhealthy" --format "{% raw %}{{.Names}}{% endraw %}"
      register: unhealthy
      changed_when: false
      tags: health

    - name: Report unhealthy containers
      debug:
        msg: "WARNING: Unhealthy containers: {{ unhealthy.stdout_lines }}"
      when: unhealthy.stdout_lines | length > 0
      tags: health

    - name: All containers healthy
      debug:
        msg: "All containers are healthy"
      when: unhealthy.stdout_lines | length == 0
      tags: health
