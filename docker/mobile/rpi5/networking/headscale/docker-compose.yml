# Headscale - Self-hosted Tailscale coordination server
# Mobile Kit - RPi 5
# https://headscale.net/

services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: serve
    ports:
      - "443:443"       # HTTPS (coordination)
      - "3478:3478/udp" # STUN
    volumes:
      - ./config:/etc/headscale
      - headscale-data:/var/lib/headscale
    environment:
      - TZ=${TZ:-America/Asuncion}
    cap_add:
      - NET_ADMIN
    networks:
      - headscale-net

  # Hourly backup sidecar - backs up Headscale DB and config
  headscale-backup:
    image: alpine:latest
    container_name: headscale-backup
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache sqlite
        echo "0 * * * * /backup.sh" | crontab -
        crond -f -l 2
    volumes:
      - ./config:/etc/headscale:ro
      - headscale-data:/var/lib/headscale:ro
      - ${BACKUP_PATH:-./backups}:/backups
      - ./backup.sh:/backup.sh:ro
    environment:
      - TZ=${TZ:-America/Asuncion}
      - BACKUP_RETENTION_HOURS=${BACKUP_RETENTION_HOURS:-720}
    networks:
      - headscale-net
    depends_on:
      - headscale

volumes:
  headscale-data:
    name: headscale-data

networks:
  headscale-net:
    name: headscale-net

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Copy config template:
#    cp config.yaml.example config/config.yaml
#
# 2. Generate private key:
#    docker run --rm -it headscale/headscale:latest headscale generate private-key > config/private.key
#
# 3. Edit config/config.yaml:
#    - Set server_url to your domain (https://hs.cronova.dev)
#    - Update listen_addr if needed
#
# 4. Start the service:
#    docker compose up -d
#
# 5. Create a user:
#    docker exec headscale headscale users create augusto
#
# 6. Generate auth key for devices:
#    docker exec headscale headscale preauthkeys create --user augusto --reusable --expiration 24h
#
# 7. Connect devices:
#    tailscale up --login-server=https://hs.cronova.dev --authkey=<key>
#
# =============================================================================
# BACKUP (AUTOMATED - HOURLY)
# =============================================================================
#
# The headscale-backup sidecar runs hourly backups automatically.
#
# What's backed up:
#   - db.sqlite (using sqlite3 .backup for consistency)
#   - config/ directory (config.yaml, private.key, etc.)
#
# Configuration (in .env):
#   - BACKUP_PATH: Where backups are stored (default: ./backups)
#   - BACKUP_RETENTION_HOURS: How long to keep backups (default: 720 = 30 days)
#
# For NAS backup, mount your NAS to BACKUP_PATH:
#   BACKUP_PATH=/mnt/nas/backups/headscale
#
# Manual backup:
#   docker exec headscale-backup /backup.sh
#
# Check backup status:
#   ls -la ${BACKUP_PATH}/
#   docker logs headscale-backup
#
# See: docs/disaster-recovery.md
#
# =============================================================================
# USEFUL COMMANDS
# =============================================================================
#
# List nodes:
#   docker exec headscale headscale nodes list
#
# List users:
#   docker exec headscale headscale users list
#
# Generate new auth key:
#   docker exec headscale headscale preauthkeys create --user augusto --reusable --expiration 24h
#
# View logs:
#   docker logs -f headscale
#
# =============================================================================
