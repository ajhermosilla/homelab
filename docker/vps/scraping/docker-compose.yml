# changedetection.io - Website change monitoring
# VPS - Vultr
# https://changedetection.io/
#
# NOTE: Using :latest intentionally - changedetection + sockpuppetbrowser
# need compatible versions, and project recommends using latest together.

services:
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest  # See note above
    env_file:
      - ../../shared/common.env
    container_name: changedetection
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=vps"
      - "com.cronova.category=scraping"
      - "com.cronova.backup=true"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    ports:
      - "5000:5000"
    volumes:
      - changedetection-data:/datastore
    environment:
      - TZ=${TZ:-America/Asuncion}
      - PUID=1000
      - PGID=1000
      - BASE_URL=https://watch.cronova.dev
      - PLAYWRIGHT_DRIVER_URL=ws://playwright:3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      playwright:
        condition: service_started
    networks:
      - scraping-net

  # Playwright for JavaScript rendering
  playwright:
    image: dgtlmoon/sockpuppetbrowser:latest
    env_file:
      - ../../shared/common.env
    container_name: playwright
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=vps"
      - "com.cronova.category=scraping"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - MAX_CONCURRENT_CHROME_PROCESSES=4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scraping-net

volumes:
  changedetection-data:
    name: changedetection-data

networks:
  scraping-net:
    name: scraping-net

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Start services:
#    docker compose up -d
#
# 2. Access web interface:
#    http://vps-ip:5000 (or via Caddy at watch.cronova.dev)
#
# 3. ⚠️  SECURITY: Set password IMMEDIATELY on first visit
#    Settings → Security → Set Password
#    This service has NO AUTH by default - password is REQUIRED
#
# 4. Configure ntfy notifications:
#    Settings > Notifications > Add
#    URL: https://notify.cronova.dev/cronova-info
#
# =============================================================================
# USE CASES
# =============================================================================
#
# - Price tracking on e-commerce sites
# - Documentation changes for tools you use
# - Job postings on company career pages
# - Government/regulatory announcements
# - Software release notes
# - Stock availability for hardware
#
# =============================================================================
# OPTIONAL: ADD TO CADDY
# =============================================================================
#
# If you want public access (not recommended):
#
# watch.cronova.dev {
#     basicauth * {
#         augusto $2a$14$... # Generate with: caddy hash-password
#     }
#     reverse_proxy localhost:5000
# }
#
# =============================================================================
# NOTES
# =============================================================================
#
# - Playwright container handles JavaScript-heavy sites
# - Uses built-in browser (no separate Browserless needed)
# - Data stored in /datastore volume
# - Can export/import watches via JSON
#
# =============================================================================
