# Headscale - Self-hosted Tailscale coordination server
# VPS - Vultr (24/7 operation)
# https://headscale.net/

services:
  headscale:
    image: headscale/headscale:0.28.0
    env_file:
      - ../../../shared/common.env
    container_name: headscale
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=vps"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    command: serve
    ports:
      # NOTE: Port 8080 NOT exposed publicly - Caddy uses internal Docker network
      - "3478:3478/udp" # STUN
    volumes:
      - ./config:/etc/headscale
      - headscale-data:/var/lib/headscale
    environment:
      - TZ=${TZ:-America/Asuncion}
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - headscale-net

  # Hourly backup sidecar
  headscale-backup:
    image: alpine:3.19
    env_file:
      - ../../../shared/common.env
    container_name: headscale-backup
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=vps"
      - "com.cronova.category=backup"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true  # Proper signal handling for cron daemon
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache sqlite
        echo "0 * * * * /backup.sh" | crontab -
        crond -f -l 2
    volumes:
      - ./config:/etc/headscale:ro
      - headscale-data:/var/lib/headscale:ro
      - ${BACKUP_PATH:-./backups}:/backups
      - ./backup.sh:/backup.sh:ro
    environment:
      - TZ=${TZ:-America/Asuncion}
      - BACKUP_RETENTION_HOURS=${BACKUP_RETENTION_HOURS:-720}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - headscale-net
    depends_on:
      - headscale

volumes:
  headscale-data:
    name: headscale-data

networks:
  headscale-net:
    name: headscale-net

# =============================================================================
# VPS HEADSCALE - 24/7 OPERATION
# =============================================================================
#
# This is the PRIMARY Headscale instance for the entire homelab mesh.
# It runs on VPS for 24/7 availability, allowing mobile kit to be powered
# off without breaking mesh connectivity.
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Copy config template:
#    cp config/config.yaml.example config/config.yaml
#
# 2. Create .env file:
#    cp .env.example .env
#
# 3. Create backups directory and make backup script executable:
#    mkdir -p backups
#    chmod +x backup.sh
#
# 4. Start Headscale:
#    docker compose up -d
#
# 5. Start Caddy (for TLS) - see ../caddy/
#    cd ../caddy && docker compose up -d
#
# 6. Create a user:
#    docker exec headscale headscale users create augusto
#
# 7. Generate auth key for devices (30 days):
#    docker exec headscale headscale preauthkeys create --user augusto --reusable --expiration 720h
#
# 8. Connect devices:
#    tailscale up --login-server=https://hs.cronova.dev --authkey=<key>
#
# =============================================================================
# DNS SETUP (CLOUDFLARE)
# =============================================================================
#
# Add DNS record:
#   Type: A
#   Name: hs
#   Content: <VPS-IP>
#   Proxy: OFF (grey cloud - direct connection needed)
#
# =============================================================================
# CADDY INTEGRATION (REQUIRED)
# =============================================================================
#
# Caddy handles TLS termination on port 443. Headscale listens on 8080.
# See ../caddy/ for Caddy configuration.
#
# Caddyfile entry:
#   hs.cronova.dev {
#       reverse_proxy headscale:8080
#   }
#
# =============================================================================
# BACKUP STRATEGY
# =============================================================================
#
# Hourly backups via sidecar container.
#
# For offsite backup to NAS (via Tailscale):
#   1. Mount NAS via sshfs or similar
#   2. Set BACKUP_PATH=/mnt/nas/backups/headscale
#
# Or use restic to push to NAS:
#   restic -r rest:http://100.82.77.97:8000/headscale backup /backups
#
# =============================================================================
# USEFUL COMMANDS
# =============================================================================
#
# List nodes:
#   docker exec headscale headscale nodes list
#
# List users:
#   docker exec headscale headscale users list
#
# Generate auth key (30 days):
#   docker exec headscale headscale preauthkeys create --user augusto --reusable --expiration 720h
#
# View routes:
#   docker exec headscale headscale routes list
#
# Enable route (for exit node):
#   docker exec headscale headscale routes enable -r <route-id>
#
# EXIT NODE SETUP (VPS):
#   1. Install Tailscale on VPS: curl -fsSL https://tailscale.com/install.sh | sh
#   2. Enable IP forwarding: echo 'net.ipv4.ip_forward = 1' >> /etc/sysctl.conf && sysctl -p
#   3. Generate auth key: docker exec headscale headscale preauthkeys create --user augusto --expiration 1h
#   4. Connect: tailscale up --login-server=https://hs.cronova.dev --authkey=<key> --advertise-exit-node --hostname=vps-vultr
#   5. Enable routes: docker exec headscale headscale routes enable -r 1 && docker exec headscale headscale routes enable -r 2
#
# View logs:
#   docker logs -f headscale
#
# Manual backup:
#   docker exec headscale-backup /backup.sh
#
# =============================================================================
# MONITORING
# =============================================================================
#
# Add to Uptime Kuma:
#   - HTTPS check: https://hs.cronova.dev/health
#   - TCP check: <VPS-IP>:3478 (STUN)
#
# Prometheus metrics (if enabled):
#   http://localhost:9090/metrics
#
# =============================================================================
# VPS SECURITY HARDENING
# =============================================================================
#
# SSH Hardening (/etc/ssh/sshd_config.d/hardening.conf):
#   PermitRootLogin no
#   PasswordAuthentication no
#   PubkeyAuthentication yes
#   MaxAuthTries 3
#
# Fail2ban (/etc/fail2ban/jail.local):
#   [sshd]
#   enabled = true
#   backend = systemd
#   maxretry = 3
#   bantime = 1h
#   banaction = ufw
#
# Auto-updates (/etc/apt/apt.conf.d/52unattended-upgrades-local):
#   Unattended-Upgrade::Automatic-Reboot "true";
#   Unattended-Upgrade::Automatic-Reboot-Time "04:00";
#
# Passwordless sudo for deploy user:
#   echo 'linuxuser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/linuxuser
#
# Firewall (UFW):
#   22/tcp   - SSH
#   443/tcp  - HTTPS
#   443/udp  - HTTP/3
#   3478/udp - STUN
#
# =============================================================================
# DEVICE REGISTRATION
# =============================================================================
#
# Mobile Kit (RPi 5):
#   tailscale up --login-server=https://hs.cronova.dev --authkey=<key>
#
# MacBook:
#   tailscale up --login-server=https://hs.cronova.dev --authkey=<key>
#
# Fixed Homelab (Mini PC, NAS, RPi 4):
#   tailscale up --login-server=https://hs.cronova.dev --authkey=<key>
#
# =============================================================================
