# Caddy - Reverse proxy with automatic HTTPS
# VPS - Vultr (24/7 operation)
# https://caddyserver.com/

services:
  caddy:
    image: caddy:2.8.4-alpine
    env_file:
      - ../../../shared/common.env
    container_name: caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    labels:
      - "com.cronova.environment=vps"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80"       # HTTP (redirect to HTTPS)
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TZ: ${TZ:-America/Asuncion}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - headscale-net
      - monitoring-net
      - adguard-net

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config

networks:
  headscale-net:
    external: true
  monitoring-net:
    external: true
  adguard-net:
    external: true

# =============================================================================
# VPS CADDY - REVERSE PROXY
# =============================================================================
#
# Caddy provides automatic HTTPS via Let's Encrypt for all VPS services.
# It terminates TLS and reverse proxies to internal services.
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Create required external networks:
#    docker network create headscale-net
#    docker network create monitoring-net
#
# 2. Start Caddy:
#    docker compose up -d
#
# 3. Add more services by editing Caddyfile and running:
#    docker exec caddy caddy reload --config /etc/caddy/Caddyfile
#
# =============================================================================
# ADDING NEW SERVICES
# =============================================================================
#
# Edit Caddyfile to add new reverse proxy entries:
#
#   newservice.cronova.dev {
#       reverse_proxy service-container:port
#   }
#
# Then reload Caddy:
#   docker exec caddy caddy reload --config /etc/caddy/Caddyfile
#
# =============================================================================
# USEFUL COMMANDS
# =============================================================================
#
# Reload config:
#   docker exec caddy caddy reload --config /etc/caddy/Caddyfile
#
# Validate config:
#   docker exec caddy caddy validate --config /etc/caddy/Caddyfile
#
# View logs:
#   docker logs -f caddy
#
# List certificates:
#   docker exec caddy caddy list-modules | grep tls
#
# =============================================================================
