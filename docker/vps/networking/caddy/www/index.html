<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cronova.dev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .tagline {
            color: #888;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            color: #888;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        a:hover {
            color: #fff;
            border-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>cronova.dev</h1>
        <p class="tagline">Augusto Hermosilla</p>
        <div class="links">
            <a href="https://status.cronova.dev">Status</a>
            <a href="https://hermosilla.me">About</a>
            <a href="https://github.com/ajhermosilla">GitHub</a>
        </div>
    </div>
</body>
</html>
