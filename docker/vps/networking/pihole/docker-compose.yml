# Pi-hole - DNS sinkhole for ad blocking
# VPS - Vultr (US-based fallback DNS)
# https://pi-hole.net/

services:
  pihole:
    image: pihole/pihole:2024.07.0
    container_name: pihole
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 3
    hostname: pihole-vps
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:80/tcp"  # Web UI on 8053 (Caddy uses 80)
    environment:
      TZ: ${TZ:-America/Asuncion}
      WEBPASSWORD: ${PIHOLE_PASSWORD:?PIHOLE_PASSWORD required in .env}
      FTLCONF_LOCAL_IPV4: ${VPS_IP}
      PIHOLE_DNS_: "1.1.1.1;9.9.9.9"
      DNSSEC: "true"
      DNSMASQ_LISTENING: all
    volumes:
      - pihole-config:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dns-net

volumes:
  pihole-config:
    name: pihole-config
  pihole-dnsmasq:
    name: pihole-dnsmasq

networks:
  dns-net:
    name: dns-net

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Set environment variables:
#    export PIHOLE_PASSWORD="your-secure-password"
#    export VPS_IP="your-vps-public-ip"
#
# 2. Or create .env file:
#    echo "PIHOLE_PASSWORD=changeme" >> ../../.env
#    echo "VPS_IP=1.2.3.4" >> ../../.env
#
# 3. Start the service:
#    docker compose up -d
#
# 4. Access web interface:
#    http://vps-ip:8053/admin
#
# =============================================================================
# VPS-SPECIFIC NOTES
# =============================================================================
#
# - This is a US-based fallback DNS for when traveling
# - Port 8053 for web UI (Caddy occupies 80/443)
# - Upstream DNS: Cloudflare + Quad9 (public, fast)
# - Tailscale devices can use this as DNS when abroad
#
# =============================================================================
# USEFUL COMMANDS
# =============================================================================
#
# docker exec -it pihole pihole -t      # Live query log
# docker exec -it pihole pihole status  # Status
# docker exec -it pihole pihole -g      # Update blocklists
#
# =============================================================================
