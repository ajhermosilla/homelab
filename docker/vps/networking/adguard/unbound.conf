# Unbound custom overrides for VPS (yvaga)
# Loaded via conf.d/ — image defaults handle security, DNSSEC, and hardening
# Only override: cache sizes (VPS RAM limited), serve-expired, access control

server:
    # =========================================================================
    # Interface — use image default port 5335 (matches built-in healthcheck)
    # =========================================================================
    interface: 0.0.0.0@5335
    port: 5335

    # =========================================================================
    # Performance — tuned for 1 vCPU, 64M container memory limit
    # Image defaults (256m caches) are too large for this VPS
    # =========================================================================
    num-threads: 1
    msg-cache-size: 16m
    rrset-cache-size: 32m
    key-cache-size: 4m
    neg-cache-size: 2m
    num-queries-per-thread: 256

    # Cache TTL bounds
    cache-min-ttl: 300
    cache-max-ttl: 14400

    # Serve stale cache while refreshing (improves resilience)
    serve-expired: yes
    serve-expired-ttl: 86400

    # =========================================================================
    # Access control — restrict to Docker networks only
    # Override image default which allows 0.0.0.0/0
    # =========================================================================
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
