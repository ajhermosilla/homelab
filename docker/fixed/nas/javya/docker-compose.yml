# Production Docker Compose Configuration
# Usage: docker compose -f docker-compose.yml up -d --build
#
# Routing: Coolify Traefik handles TLS + reverse proxy via dynamic config
# See: /data/coolify/proxy/dynamic/javya.yaml

services:
  db:
    image: postgres:16-alpine
    container_name: javya-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=apps"
      - "com.cronova.backup=true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-javya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-javya}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-javya} -d ${POSTGRES_DB:-javya}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javya-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=apps"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-javya}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-javya}
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
      coolify:
        aliases:
          - javya-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: javya-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=apps"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
      coolify:
        aliases:
          - javya-frontend

volumes:
  postgres_data:

networks:
  coolify:
    external: true
