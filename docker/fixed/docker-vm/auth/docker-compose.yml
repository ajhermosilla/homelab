# Auth Stack - Authelia SSO
# Fixed Homelab - Docker VM
# Single sign-on with TOTP 2FA (Oke)

services:
  # =========================================================================
  # Authelia - Authentication & Authorization
  # https://www.authelia.com/
  # =========================================================================
  authelia:
    image: authelia/authelia:4.39.15
    env_file:
      - ../../../shared/common.env
    container_name: authelia
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=auth"
      - "com.cronova.critical=true"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    ports:
      - "127.0.0.1:9091:9091"
    volumes:
      - ./config:/config:ro
      - authelia-data:/data
    environment:
      TZ: ${TZ:-America/Asuncion}
      AUTHELIA_JWT_SECRET_FILE: /config/secrets/jwt
      AUTHELIA_SESSION_SECRET_FILE: /config/secrets/session
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /config/secrets/encryption
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - caddy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Authelia Backup Sidecar - Restic to NAS (3:30 AM PYT)
  # =========================================================================
  authelia-backup:
    image: restic/restic:0.16.4
    container_name: authelia-backup
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=auth"
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "30 3 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - authelia-data:/data:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/authelia}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      BACKUP_PATH: /data
      BACKUP_TAG: authelia
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - caddy-net
    depends_on:
      authelia:
        condition: service_healthy

volumes:
  authelia-data:
    name: authelia-data

networks:
  caddy-net:
    external: true

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Generate secrets:
#    openssl rand -base64 32 > config/secrets/jwt
#    openssl rand -base64 32 > config/secrets/session
#    openssl rand -base64 32 > config/secrets/encryption
#
# 2. Generate user password hashes:
#    docker run --rm authelia/authelia:latest \
#      authelia crypto hash generate argon2 --password 'your-password'
#
# 3. Update config/users_database.yml with the hashes
#
# 4. Start Authelia:
#    docker compose up -d
#
# 5. Access: https://auth.cronova.dev
#    First login will prompt for TOTP enrollment.
#
# =============================================================================
# DNS ENTRIES (Pi-hole)
# =============================================================================
#
# Add to Pi-hole local DNS:
#   auth.cronova.dev → 192.168.0.10
#
# =============================================================================
# CADDY INTEGRATION
# =============================================================================
#
# Authelia is used via forward_auth in Caddyfile.
# Protected services get the (authelia) snippet imported.
#
# Services with their own auth (HA, Frigate, Vaultwarden) should NOT
# be protected by Authelia to avoid double-authentication.
#
# =============================================================================
# SECRETS (.gitignored)
# =============================================================================
#
# config/secrets/jwt        - JWT signing secret
# config/secrets/session    - Session encryption secret
# config/secrets/encryption - Storage encryption key
#
# These files MUST exist before starting Authelia.
# Generate with: openssl rand -base64 32
#
# =============================================================================
