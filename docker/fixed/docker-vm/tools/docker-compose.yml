# Tools Stack - Dozzle + BentoPDF + Homepage
# Fixed Homelab - Docker VM
# Log viewer, PDF tools, and dashboard

services:
  # =========================================================================
  # Dozzle - Docker Log Viewer (Ysyry)
  # https://dozzle.dev/
  # =========================================================================
  dozzle:
    image: amir20/dozzle:latest
    env_file:
      - ../../../shared/common.env
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=tools"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    ports:
      - "127.0.0.1:9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
    networks:
      - caddy-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =========================================================================
  # BentoPDF - PDF Tools (Kuatia)
  # https://github.com/alam00000/bentopdf
  # Client-side PDF processing via WebAssembly — no server-side overhead.
  # Replaces Stirling-PDF (Java/Spring Boot had 85% idle CPU, ~500MB RAM).
  # =========================================================================
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:latest
    env_file:
      - ../../../shared/common.env
    container_name: bentopdf
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=tools"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    ports:
      - "127.0.0.1:8580:8080"
    environment:
      TZ: ${TZ:-America/Asuncion}
    networks:
      - caddy-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =========================================================================
  # Homepage - Dashboard (Mbyja)
  # https://gethomepage.dev/
  # =========================================================================
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    env_file:
      - ../../../shared/common.env
    container_name: homepage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=tools"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "127.0.0.1:3030:3000"
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
    networks:
      - caddy-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  caddy-net:
    external: true

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Start tools stack:
#    docker compose up -d
#
# 2. Access services:
#    - Dozzle: https://ysyry.cronova.dev
#    - BentoPDF: https://kuatia.cronova.dev
#    - Homepage: https://mbyja.cronova.dev
#
# 3. Homepage config files are in ./homepage/ directory.
#    Edit services.yaml to customize the dashboard.
#
# =============================================================================
# DNS ENTRIES (Pi-hole)
# =============================================================================
#
# Add to Pi-hole local DNS:
#   ysyry.cronova.dev → 192.168.0.10
#   kuatia.cronova.dev → 192.168.0.10
#   mbyja.cronova.dev → 192.168.0.10
#
# =============================================================================
