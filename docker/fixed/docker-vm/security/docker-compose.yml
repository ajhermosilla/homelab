# Security Stack - Vaultwarden + Frigate
# Fixed Homelab - Docker VM
# Password management and NVR with AI detection

services:
  # =========================================================================
  # Vaultwarden - Password Manager
  # https://github.com/dani-garcia/vaultwarden
  # =========================================================================
  vaultwarden:
    image: vaultwarden/server:1.35.2
    env_file:
      - ../../../shared/common.env
    container_name: vaultwarden
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=security"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "127.0.0.1:8843:80"
    volumes:
      - vaultwarden-data:/data
    environment:
      TZ: ${TZ:-America/Asuncion}
      DOMAIN: https://vault.cronova.dev
      # Security: Signups disabled by default. Enable temporarily to create accounts.
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS:-false}
      # ADMIN_TOKEN is set via .env (Argon2id hash with $$ escaping)
      # Docker Compose v5 auto-injects .env vars, overriding _FILE mechanism
      WEBSOCKET_ENABLED: "true"
      LOG_LEVEL: info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - security-net

  # =========================================================================
  # Frigate - NVR with AI Object Detection
  # https://frigate.video/
  # =========================================================================
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    env_file:
      - ../../../shared/common.env
    container_name: frigate
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=security"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2'
    shm_size: "256mb"
    ports:
      # Port 5000 not mapped — Caddy reaches Frigate via security-net Docker network
      - "127.0.0.1:8554:8554"  # RTSP restream — internal only
      - "8555:8555/tcp"         # WebRTC — browser needs direct UDP
      - "8555:8555/udp"
    volumes:
      - ./frigate.yml:/config/config.yml:ro
      - frigate-config:/config
      - ${FRIGATE_RECORDINGS:-/mnt/nas/frigate}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000  # 1GB for cache
    devices:
      # Intel QuickSync for hardware decoding (N150)
      - /dev/dri:/dev/dri
    environment:
      TZ: ${TZ:-America/Asuncion}
      FRIGATE_REOLINK_USER: ${FRIGATE_REOLINK_USER:-admin}
      FRIGATE_FRONT_PASS: ${FRIGATE_FRONT_PASS}
      FRIGATE_BACK_PASS: ${FRIGATE_BACK_PASS}
      FRIGATE_MQTT_USER: ${FRIGATE_MQTT_USER:-frigate}
      FRIGATE_MQTT_PASS: ${FRIGATE_MQTT_PASS}
      FRIGATE_TAPO_USER: ${FRIGATE_TAPO_USER}
      FRIGATE_TAPO_PASS: ${FRIGATE_TAPO_PASS}
    logging:
      driver: "json-file"
      options:
        # Larger log size for NVR - continuous video processing generates more logs
        max-size: "50m"
        max-file: "3"
    # Note: Frigate depends on Mosquitto (automation stack) for MQTT.
    # Start automation stack before security stack.
    networks:
      - security-net
      - mqtt-net  # For MQTT communication with Mosquitto

  # =========================================================================
  # Vaultwarden Backup Sidecar
  # Daily encrypted backups to NAS via restic
  # =========================================================================
  vaultwarden-backup:
    image: restic/restic:0.16.4
    env_file:
      - ../../../shared/common.env
    container_name: vaultwarden-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true  # Proper signal handling for cron daemon
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - vaultwarden-data:/data:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/vaultwarden}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      BACKUP_PATH: /data
      BACKUP_TAG: vaultwarden
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - security-net
    depends_on:
      - vaultwarden

volumes:
  vaultwarden-data:
    name: vaultwarden-data
  frigate-config:
    name: frigate-config

networks:
  security-net:
    name: security-net
  mqtt-net:
    external: true  # Created by automation stack

# =============================================================================
# STARTUP ORDER
# =============================================================================
#
# The automation stack MUST be started before the security stack:
#   1. cd ../automation && docker compose up -d   # Creates mqtt-net
#   2. cd ../security && docker compose up -d     # Joins mqtt-net
#
# This ensures the mqtt-net network exists before Frigate tries to join it.
#
# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# TZ=America/Asuncion
# VAULTWARDEN_ADMIN_TOKEN=<generate-with-openssl-rand-base64-32>
# VAULTWARDEN_SIGNUPS=false
# FRIGATE_REOLINK_USER=admin
# FRIGATE_FRONT_PASS=your-front-camera-password
# FRIGATE_BACK_PASS=your-back-camera-password-url-encoded
# FRIGATE_MQTT_USER=frigate
# FRIGATE_MQTT_PASS=your-mqtt-password
# FRIGATE_TAPO_USER=your-tapo-username
# FRIGATE_TAPO_PASS=your-tapo-password
# FRIGATE_RECORDINGS=/mnt/nas/frigate
#
# =============================================================================
# NFS MOUNT FOR FRIGATE (Docker VM → NAS)
# =============================================================================
#
# Mount NAS Purple 2TB for Frigate recordings:
#
# sudo mkdir -p /mnt/nas/frigate
# sudo mount -t nfs 192.168.0.12:/srv/frigate /mnt/nas/frigate
#
# Add to /etc/fstab:
# 192.168.0.12:/srv/frigate /mnt/nas/frigate nfs defaults 0 0
#
# =============================================================================
# FRIGATE CONFIGURATION (frigate.yml)
# =============================================================================
#
# Create frigate.yml in this directory:
#
# mqtt:
#   enabled: true
#   host: mosquitto
#   port: 1883
#   user: frigate
#   password: frigate-password
#
# detectors:
#   default:
#     type: cpu  # Use Coral USB if available later
#
# ffmpeg:
#   hwaccel_args: preset-vaapi  # Intel QuickSync
#
# cameras:
#   front_door:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.10.101:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 7
#         mode: motion
#       events:
#         retain:
#           default: 14
#     snapshots:
#       enabled: true
#       retain:
#         default: 14
#
#   back_yard:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.10.102:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 7
#         mode: motion
#
#   indoor_cam:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.0.101:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 3
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Mount NFS share for recordings (see above)
#
# 2. Create .env with admin token:
#    openssl rand -base64 32
#
# 3. Create frigate.yml with camera configuration
#
# 4. Start services:
#    docker compose up -d
#
# 5. Access services:
#    - Vaultwarden: https://vault.cronova.dev (or http://192.168.0.10:8843)
#    - Frigate: https://taguato.cronova.dev (port 5000 localhost-only)
#
# =============================================================================
# VAULTWARDEN ADMIN PANEL
# =============================================================================
#
# Access at: https://vault.cronova.dev/admin
# Use VAULTWARDEN_ADMIN_TOKEN from .env
#
# Disable public signups after creating your account.
#
# =============================================================================
# CAMERA SETUP (Reolink RLC-520A)
# =============================================================================
#
# 1. Configure static IPs in OPNsense DHCP
# 2. Access each camera at http://192.168.10.10x (IoT VLAN)
# 3. Enable RTSP in camera settings
# 4. Note stream URLs:
#    - Main: rtsp://{USER}:{PASS}@ip:554/h264Preview_01_main
#    - Sub:  rtsp://{USER}:{PASS}@ip:554/h264Preview_01_sub
#
# Use sub stream for detection (lower res = faster), main for recording.
#
# =============================================================================
# TAPO C110 (WiFi Camera)
# =============================================================================
#
# RTSP URL format:
#   rtsp://username:password@192.168.0.101:554/stream1
#
# Enable RTSP in Tapo app:
#   Camera Settings → Advanced Settings → Device Account
#   Create username/password for RTSP access
#
# =============================================================================
# HARDWARE ACCELERATION
# =============================================================================
#
# Intel N150 supports VA-API (QuickSync):
#
# Verify with:
#   docker exec frigate vainfo
#
# Expected output shows decode capabilities:
#   VAProfileH264High : VAEntrypointVLD
#   VAProfileHEVCMain : VAEntrypointVLD
#
# =============================================================================
# FUTURE: CORAL USB TPU
# =============================================================================
#
# When Coral USB is added, update frigate.yml detectors:
#
# detectors:
#   coral:
#     type: edgetpu
#     device: usb
#
# And add device mount:
#   devices:
#     - /dev/bus/usb:/dev/bus/usb
#
# =============================================================================
