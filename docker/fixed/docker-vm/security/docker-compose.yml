# Security Stack - Vaultwarden + Frigate
# Fixed Homelab - Docker VM
# Password management and NVR with AI detection

# =============================================================================
# SECRETS (file-based, more secure than env vars)
# =============================================================================
# Create secret files in ./secrets/ directory:
#   openssl rand -base64 32 > secrets/admin_token.txt
#   openssl rand -base64 32 > secrets/restic_password.txt
#   chmod 600 secrets/*.txt

secrets:
  vaultwarden_admin_token:
    file: ./secrets/admin_token.txt
  restic_password:
    file: ./secrets/restic_password.txt

services:
  # =========================================================================
  # Vaultwarden - Password Manager
  # https://github.com/dani-garcia/vaultwarden
  # =========================================================================
  vaultwarden:
    image: vaultwarden/server:1.32.0
    env_file:
      - ../../../shared/common.env
    container_name: vaultwarden
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=security"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "8843:80"
    volumes:
      - vaultwarden-data:/data
    secrets:
      - vaultwarden_admin_token
    environment:
      TZ: ${TZ:-America/Asuncion}
      DOMAIN: https://vault.cronova.dev
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS:-false}
      ADMIN_TOKEN_FILE: /run/secrets/vaultwarden_admin_token
      WEBSOCKET_ENABLED: "true"
      LOG_LEVEL: info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - security-net

  # =========================================================================
  # Frigate - NVR with AI Object Detection
  # https://frigate.video/
  # =========================================================================
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    env_file:
      - ../../../shared/common.env
    container_name: frigate
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=security"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    shm_size: "256mb"
    ports:
      - "5000:5000"     # Web UI
      - "8554:8554"     # RTSP restream
      - "8555:8555/tcp" # WebRTC
      - "8555:8555/udp"
    volumes:
      - ./frigate.yml:/config/config.yml:ro
      - frigate-config:/config
      - ${FRIGATE_RECORDINGS:-/mnt/nas/frigate}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000  # 1GB for cache
    devices:
      # Intel QuickSync for hardware decoding (N150)
      - /dev/dri:/dev/dri
    environment:
      TZ: ${TZ:-America/Asuncion}
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    # Note: Frigate depends on Mosquitto (automation stack) for MQTT.
    # Start automation stack before security stack.
    networks:
      - security-net

  # =========================================================================
  # Vaultwarden Backup Sidecar
  # Daily encrypted backups to NAS via restic
  # =========================================================================
  vaultwarden-backup:
    image: restic/restic:0.16.4
    env_file:
      - ../../../shared/common.env
    container_name: vaultwarden-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - vaultwarden-data:/data:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    secrets:
      - restic_password
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.1.12:8000/vaultwarden}
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      BACKUP_PATH: /data
      BACKUP_TAG: vaultwarden
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - security-net
    depends_on:
      - vaultwarden

volumes:
  vaultwarden-data:
    name: vaultwarden-data
  frigate-config:
    name: frigate-config

networks:
  security-net:
    name: security-net

# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# TZ=America/Asuncion
# VAULTWARDEN_ADMIN_TOKEN=<generate-with-openssl-rand-base64-32>
# VAULTWARDEN_SIGNUPS=false
# FRIGATE_RTSP_PASSWORD=camera-password
# FRIGATE_RECORDINGS=/mnt/nas/frigate
#
# =============================================================================
# NFS MOUNT FOR FRIGATE (Docker VM → NAS)
# =============================================================================
#
# Mount NAS Purple 2TB for Frigate recordings:
#
# sudo mkdir -p /mnt/nas/frigate
# sudo mount -t nfs 192.168.1.12:/srv/frigate /mnt/nas/frigate
#
# Add to /etc/fstab:
# 192.168.1.12:/srv/frigate /mnt/nas/frigate nfs defaults 0 0
#
# =============================================================================
# FRIGATE CONFIGURATION (frigate.yml)
# =============================================================================
#
# Create frigate.yml in this directory:
#
# mqtt:
#   enabled: true
#   host: mosquitto
#   port: 1883
#   user: frigate
#   password: frigate-password
#
# detectors:
#   default:
#     type: cpu  # Use Coral USB if available later
#
# ffmpeg:
#   hwaccel_args: preset-vaapi  # Intel QuickSync
#
# cameras:
#   front_door:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.1.101:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 7
#         mode: motion
#       events:
#         retain:
#           default: 14
#     snapshots:
#       enabled: true
#       retain:
#         default: 14
#
#   back_yard:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.1.102:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 7
#         mode: motion
#
#   indoor_cam:
#     ffmpeg:
#       inputs:
#         - path: rtsp://{CAM_USER}:{CAM_PASS}@192.168.1.103:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       enabled: true
#       width: 1920
#       height: 1080
#       fps: 5
#     record:
#       enabled: true
#       retain:
#         days: 3
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Mount NFS share for recordings (see above)
#
# 2. Create .env with admin token:
#    openssl rand -base64 32
#
# 3. Create frigate.yml with camera configuration
#
# 4. Start services:
#    docker compose up -d
#
# 5. Access services:
#    - Vaultwarden: https://vault.cronova.dev (or http://192.168.1.10:8843)
#    - Frigate: http://192.168.1.10:5000
#
# =============================================================================
# VAULTWARDEN ADMIN PANEL
# =============================================================================
#
# Access at: https://vault.cronova.dev/admin
# Use VAULTWARDEN_ADMIN_TOKEN from .env
#
# Disable public signups after creating your account.
#
# =============================================================================
# CAMERA SETUP (Reolink RLC-520A)
# =============================================================================
#
# 1. Configure static IPs in OPNsense DHCP
# 2. Access each camera at http://192.168.1.10x
# 3. Enable RTSP in camera settings
# 4. Note stream URLs:
#    - Main: rtsp://{USER}:{PASS}@ip:554/h264Preview_01_main
#    - Sub:  rtsp://{USER}:{PASS}@ip:554/h264Preview_01_sub
#
# Use sub stream for detection (lower res = faster), main for recording.
#
# =============================================================================
# TAPO C110 (WiFi Camera)
# =============================================================================
#
# RTSP URL format:
#   rtsp://username:password@192.168.1.103:554/stream1
#
# Enable RTSP in Tapo app:
#   Camera Settings → Advanced Settings → Device Account
#   Create username/password for RTSP access
#
# =============================================================================
# HARDWARE ACCELERATION
# =============================================================================
#
# Intel N150 supports VA-API (QuickSync):
#
# Verify with:
#   docker exec frigate vainfo
#
# Expected output shows decode capabilities:
#   VAProfileH264High : VAEntrypointVLD
#   VAProfileHEVCMain : VAEntrypointVLD
#
# =============================================================================
# FUTURE: CORAL USB TPU
# =============================================================================
#
# When Coral USB is added, update frigate.yml detectors:
#
# detectors:
#   coral:
#     type: edgetpu
#     device: usb
#
# And add device mount:
#   devices:
#     - /dev/bus/usb:/dev/bus/usb
#
# =============================================================================
