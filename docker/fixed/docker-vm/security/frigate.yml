# Frigate NVR Configuration
# https://docs.frigate.video/configuration/
#
# Cameras:
#   - 2x Reolink RLC-520A (5MP PoE)
#   - 1x TP-Link Tapo C110 (3MP WiFi)
#
# Network:
#   - LAN (192.168.0.x) — Tapo C110 on WiFi, Reolinks on PoE
#
# Hardware:
#   - Intel N150 QuickSync for video decode (VA-API)
#   - Recordings stored on NAS via NFS mount
#   - OpenVINO GPU for object detection (~15ms inference)
#   - VA-API for hardware video decoding

auth:
  enabled: true
  failed_login_rate_limit: "1/second;5/minute;20/hour"

mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASS}"

detectors:
  ov:
    type: openvino
    device: GPU

model:
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

ffmpeg:
  hwaccel_args: preset-intel-qsv-h264

# Face recognition — assigns sub_label (e.g. "augusto") to detected persons
# Train faces via Frigate UI → Faces tab, or auto-collected from detections
face_recognition:
  enabled: true
  model_size: small
  min_area: 500
  min_faces: 1
  save_attempts: 100
  blur_confidence_filter: true

# go2rtc restreams all cameras for WebRTC live view and single RTSP connection per stream
# Also avoids Frigate's YAML parser URL-decoding %XX sequences in passwords
go2rtc:
  streams:
    front_door_sub:
      - "rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_FRONT_PASS}@<CAMERA_FRONT_IP>:554/h264Preview_01_sub"
    front_door_main:
      - "rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_FRONT_PASS}@<CAMERA_FRONT_IP>:554/h264Preview_01_main"
    back_yard_sub:
      - "rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_BACK_PASS}@<CAMERA_BACK_IP>:554/h264Preview_01_sub"
    back_yard_main:
      - "rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_BACK_PASS}@<CAMERA_BACK_IP>:554/h264Preview_01_main"
    indoor:
      - "ffmpeg:rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASS}@<CAMERA_INDOOR_IP>:554/stream1#raw=-vf transpose=2,scale=360:640#video=h264"

# Global recording settings
record:
  enabled: true
  retain:
    days: 1
    mode: motion

# Global snapshot settings
snapshots:
  enabled: true
  timestamp: true
  quality: 85
  retain:
    default: 2

# Global detection settings
detect:
  enabled: true
  fps: 5

# Object detection settings
objects:
  track:
    - person
    - car
    - dog
    - cat
  filters:
    person:
      min_score: 0.5
      threshold: 0.7
    car:
      min_score: 0.5
      threshold: 0.7
      min_area: 2000
    dog:
      min_score: 0.6
      threshold: 0.75
    cat:
      min_score: 0.6
      threshold: 0.75

# =============================================================================
# CAMERAS
# =============================================================================
#
# ⚠️  IMPORTANT: Set camera credentials in .env before deploying!
#     Required env vars: FRIGATE_REOLINK_USER, FRIGATE_FRONT_PASS, FRIGATE_BACK_PASS
#     These are passed as environment variables and substituted by Frigate's {VAR} syntax.
#     Note: FRIGATE_BACK_PASS must be URL-encoded (e.g., %21 for !) since go2rtc doesn't auto-encode.
#
# -----------------------------------------------------------------------------
# RTSP URL Formats by Camera Model
# -----------------------------------------------------------------------------
#
# Reolink RLC-520A (PoE):
#   Main: rtsp://{USER}:{PASS}@ip:554/h264Preview_01_main (5MP, recording)
#   Sub:  rtsp://{USER}:{PASS}@ip:554/h264Preview_01_sub (640x480, detection)
#   Default credentials: admin / (set during camera setup)
#   Enable RTSP: Device Settings → Network → Advanced → Port Settings
#
# TP-Link Tapo C110 (WiFi):
#   Stream: rtsp://{USER}:{PASS}@ip:554/stream1 (1080p)
#   Create RTSP account in Tapo app: Camera Settings → Advanced → Device Account
#   Note: Uses single stream for both detection and recording
#
# Use sub stream for detect (faster), main stream for record (quality).

cameras:
  # -------------------------------------------------------------------------
  # Front Door - Reolink RLC-520A (PoE)
  # -------------------------------------------------------------------------
  front_door:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/front_door_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/front_door_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
    motion:
      contour_area: 25
    objects:
      track:
        - person
        - car
    zones:
      driveway:
        coordinates: <REDACTED>  # see frigate-zones-real.local
        objects:
          - person
          - car
        inertia: 3
        loitering_time: 4
      street:
        coordinates: <REDACTED>  # see frigate-zones-real.local
        objects:
          - person
          - car
        inertia: 3
        loitering_time: 8
    review:
      alerts:
        labels:
          - person
          - car
        required_zones:
          - driveway
      detections:
        labels:
          - person
          - car
        required_zones:
          - driveway
          - street

  # -------------------------------------------------------------------------
  # Back Yard - Reolink RLC-520A (PoE)
  # -------------------------------------------------------------------------
  back_yard:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/back_yard_sub
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/back_yard_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
    motion:
      contour_area: 25
    objects:
      track:
        - person
        - dog
        - cat
    zones:
      terraza:
        coordinates: <REDACTED>  # see frigate-zones-real.local
        objects:
          - person
          - dog
          - cat
        inertia: 3
        loitering_time: 4
      street:
        coordinates: <REDACTED>  # see frigate-zones-real.local
        objects:
          - person
        inertia: 3
        loitering_time: 8
    review:
      alerts:
        labels:
          - person
        required_zones:
          - terraza
      detections:
        labels:
          - person
          - dog
          - cat
        required_zones:
          - terraza
          - street

  # -------------------------------------------------------------------------
  # Indoor - TP-Link Tapo C110 (WiFi)
  # -------------------------------------------------------------------------
  indoor:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/indoor
          roles:
            - detect
            - record
    detect:
      width: 360
      height: 640
      fps: 5
    record:
      enabled: false
    snapshots:
      enabled: true
    objects:
      track:
        - person

# =============================================================================
# SETUP NOTES
# =============================================================================
#
# 1. Set credentials in .env file:
#    FRIGATE_MQTT_USER=frigate
#    FRIGATE_MQTT_PASS=your-mqtt-password
#    FRIGATE_REOLINK_USER=admin
#    FRIGATE_FRONT_PASS=your-front-camera-password
#    FRIGATE_BACK_PASS=your-back-camera-password-url-encoded
#    FRIGATE_TAPO_USER=your-tapo-username
#    FRIGATE_TAPO_PASS=your-tapo-password
#    (See .env.example for template)
#
# 2. Camera IPs:
#    - <CAMERA_FRONT_IP> - Front door (Reolink)
#    - <CAMERA_BACK_IP> - Back yard (Reolink)
#    - <CAMERA_INDOOR_IP> - Indoor (Tapo)
#
# 3. Enable RTSP on cameras:
#    - Reolink: Device Settings → Network → Advanced → Port Settings
#    - Tapo: App → Camera Settings → Advanced → Device Account
#
# 4. Verify hardware acceleration:
#    docker exec frigate vainfo
#
# 5. Mount NFS before starting:
#    sudo mount -t nfs 192.168.0.12:/srv/frigate /mnt/nas/frigate
#
# =============================================================================
