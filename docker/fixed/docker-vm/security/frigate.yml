# Frigate NVR Configuration
# https://docs.frigate.video/configuration/
#
# Cameras:
#   - 2x Reolink RLC-520A (5MP PoE)
#   - 1x TP-Link Tapo C110 (3MP WiFi)
#
# Network:
#   - IoT VLAN 10 (192.168.10.x) for camera isolation
#
# Hardware:
#   - Intel N150 QuickSync for video decode (VA-API)
#   - Recordings stored on NAS via NFS mount
#   - Future: Coral USB TPU for detection

mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  user: ${FRIGATE_MQTT_USER}
  password: ${FRIGATE_MQTT_PASS}

detectors:
  cpu:
    type: cpu
    num_threads: 2
  # Uncomment when Coral USB TPU is added:
  # coral:
  #   type: edgetpu
  #   device: usb

ffmpeg:
  hwaccel_args: preset-vaapi  # Intel QuickSync

# Global recording settings
record:
  enabled: true
  retain:
    days: 7
    mode: motion
  events:
    retain:
      default: 14
      mode: active_objects

# Global snapshot settings
snapshots:
  enabled: true
  retain:
    default: 14

# Global detection settings
detect:
  enabled: true
  fps: 5

# Object detection settings
objects:
  track:
    - person
    - car
    - dog
    - cat
  filters:
    person:
      min_score: 0.5
      threshold: 0.7

# =============================================================================
# CAMERAS
# =============================================================================
#
# ⚠️  IMPORTANT: Set camera credentials in .env before deploying!
#     Required env vars: FRIGATE_REOLINK_USER, FRIGATE_REOLINK_PASS, FRIGATE_TAPO_USER, FRIGATE_TAPO_PASS
#     These are substituted into RTSP URLs automatically.
#
# -----------------------------------------------------------------------------
# RTSP URL Formats by Camera Model
# -----------------------------------------------------------------------------
#
# Reolink RLC-520A (PoE):
#   Main: rtsp://{USER}:{PASS}@ip:554/h264Preview_01_main (5MP, recording)
#   Sub:  rtsp://{USER}:{PASS}@ip:554/h264Preview_01_sub (640x480, detection)
#   Default credentials: admin / (set during camera setup)
#   Enable RTSP: Device Settings → Network → Advanced → Port Settings
#
# TP-Link Tapo C110 (WiFi):
#   Stream: rtsp://{USER}:{PASS}@ip:554/stream1 (1080p)
#   Create RTSP account in Tapo app: Camera Settings → Advanced → Device Account
#   Note: Uses single stream for both detection and recording
#
# Use sub stream for detect (faster), main stream for record (quality).

cameras:
  # -------------------------------------------------------------------------
  # Front Door - Reolink RLC-520A (PoE)
  # -------------------------------------------------------------------------
  front_door:
    ffmpeg:
      inputs:
        - path: rtsp://${FRIGATE_REOLINK_USER}:${FRIGATE_REOLINK_PASS}@192.168.10.101:554/h264Preview_01_sub
          roles:
            - detect
        - path: rtsp://${FRIGATE_REOLINK_USER}:${FRIGATE_REOLINK_PASS}@192.168.10.101:554/h264Preview_01_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
    objects:
      track:
        - person
        - car

  # -------------------------------------------------------------------------
  # Back Yard - Reolink RLC-520A (PoE)
  # -------------------------------------------------------------------------
  back_yard:
    ffmpeg:
      inputs:
        - path: rtsp://${FRIGATE_REOLINK_USER}:${FRIGATE_REOLINK_PASS}@192.168.10.102:554/h264Preview_01_sub
          roles:
            - detect
        - path: rtsp://${FRIGATE_REOLINK_USER}:${FRIGATE_REOLINK_PASS}@192.168.10.102:554/h264Preview_01_main
          roles:
            - record
    detect:
      width: 640
      height: 480
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
    objects:
      track:
        - person
        - dog
        - cat

  # -------------------------------------------------------------------------
  # Indoor - TP-Link Tapo C110 (WiFi)
  # -------------------------------------------------------------------------
  indoor:
    ffmpeg:
      inputs:
        - path: rtsp://${FRIGATE_TAPO_USER}:${FRIGATE_TAPO_PASS}@192.168.10.103:554/stream1
          roles:
            - detect
            - record
    detect:
      width: 1920
      height: 1080
      fps: 5
    record:
      enabled: true
      retain:
        days: 3  # Less retention for indoor
    snapshots:
      enabled: true
    objects:
      track:
        - person

# =============================================================================
# SETUP NOTES
# =============================================================================
#
# 1. Set credentials in .env file:
#    FRIGATE_MQTT_USER=frigate
#    FRIGATE_MQTT_PASS=your-mqtt-password
#    FRIGATE_REOLINK_USER=admin
#    FRIGATE_REOLINK_PASS=your-reolink-password
#    FRIGATE_TAPO_USER=your-tapo-username
#    FRIGATE_TAPO_PASS=your-tapo-password
#    (See .env.example for template)
#
# 2. Camera IPs (IoT VLAN 10):
#    - 192.168.10.101 - Front door (Reolink)
#    - 192.168.10.102 - Back yard (Reolink)
#    - 192.168.10.103 - Indoor (Tapo)
#
# 3. Enable RTSP on cameras:
#    - Reolink: Device Settings → Network → Advanced → Port Settings
#    - Tapo: App → Camera Settings → Advanced → Device Account
#
# 4. Verify hardware acceleration:
#    docker exec frigate vainfo
#
# 5. Mount NFS before starting:
#    sudo mount -t nfs 192.168.1.12:/srv/frigate /mnt/nas/frigate
#
# =============================================================================
