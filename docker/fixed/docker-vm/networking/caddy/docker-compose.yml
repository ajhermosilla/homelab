# Caddy - Reverse proxy with auto-SSL
# Fixed Homelab - Docker VM
# https://caddyserver.com/

services:
  caddy:
    image: caddy:2.8
    env_file:
      - ../../../../shared/common.env
    container_name: caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80/tcp"     # HTTP (redirect to HTTPS)
      - "443:443/tcp"   # HTTPS
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TZ: ${TZ:-America/Asuncion}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - caddy-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config

networks:
  caddy-net:
    name: caddy-net

# =============================================================================
# CADDYFILE
# =============================================================================
#
# Create a Caddyfile in this directory with:
#
# vault.cronova.dev {
#     reverse_proxy localhost:8843
# }
#
# home.cronova.dev {
#     reverse_proxy localhost:8123
# }
#
# media.cronova.dev {
#     reverse_proxy localhost:8096
# }
#
# frigate.cronova.dev {
#     reverse_proxy localhost:5000
# }
#
# =============================================================================
# SSL OPTIONS
# =============================================================================
#
# Option 1: Tailscale HTTPS (recommended for internal services)
#   - Use machine certificates via Tailscale
#   - See: https://tailscale.com/kb/1153/enabling-https/
#
# Option 2: Internal CA
#   - Generate self-signed CA
#   - Distribute CA to devices
#
# Option 3: Let's Encrypt (for public services)
#   - Requires public DNS + port 443 open
#   - Works automatically with Caddy
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Create Caddyfile in this directory
#
# 2. Start Caddy:
#    docker compose up -d
#
# 3. Check logs:
#    docker logs -f caddy
#
# 4. Test:
#    curl -k https://vault.cronova.dev
#
# =============================================================================
