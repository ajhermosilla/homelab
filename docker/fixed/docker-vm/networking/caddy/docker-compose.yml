# Caddy - Reverse proxy with Cloudflare DNS-01 TLS
# Fixed Homelab - Docker VM
# https://caddyserver.com/

services:
  caddy:
    build: .
    env_file:
      - ../../../../shared/common.env
    container_name: caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.centurylinklabs.watchtower.enable=false"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80/tcp"      # HTTP
      - "443:443/tcp"     # HTTPS
      - "443:443/udp"     # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TZ: ${TZ:-America/Asuncion}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - caddy-net
      - security-net  # Direct access to Frigate (port 5000 not exposed to host)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =========================================================================
  # Caddy Backup Sidecar
  # Daily encrypted backups to NAS via restic
  # Backs up TLS certificates and ACME state (caddy-data volume)
  # Schedule: 2:15 AM PYT (between VW 2:00 and HA 2:30)
  # =========================================================================
  caddy-backup:
    image: restic/restic:0.16.4
    env_file:
      - ../../../../shared/common.env
    container_name: caddy-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "15 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - caddy-data:/data/caddy-data:ro
      - caddy-config:/data/caddy-config:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/caddy}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      BACKUP_PATH: /data
      BACKUP_TAG: caddy
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - caddy-net

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config

networks:
  caddy-net:
    name: caddy-net
  security-net:
    external: true  # Created by security stack
