# Caddy - Reverse proxy with Cloudflare DNS-01 TLS
# Fixed Homelab - Docker VM
# https://caddyserver.com/

services:
  caddy:
    build: .
    env_file:
      - ../../../../shared/common.env
    container_name: caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.centurylinklabs.watchtower.enable=false"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80/tcp"      # HTTP
      - "443:443/tcp"     # HTTPS
      - "443:443/udp"     # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TZ: ${TZ:-America/Asuncion}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - caddy-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config

networks:
  caddy-net:
    name: caddy-net
