# Pi-hole - DNS ad-blocking
# Fixed Homelab - Docker VM
# https://pi-hole.net/

services:
  pihole:
    image: pihole/pihole:2025.04.0
    env_file:
      - ../../../../shared/common.env
    container_name: pihole
    hostname: pihole-fixed
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:80/tcp"   # Web admin (8053 to avoid conflict with Caddy)
    volumes:
      - pihole-config:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    environment:
      TZ: ${TZ:-America/Asuncion}
      WEBPASSWORD: ${PIHOLE_PASSWORD:?PIHOLE_PASSWORD required in .env}
      FTLCONF_LOCAL_IPV4: ${HOST_IP:-192.168.0.10}
      PIHOLE_DNS_: 1.1.1.1;9.9.9.9
      DNSSEC: "true"
      FTLCONF_dns_listeningMode: all
      QUERY_LOGGING: "true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_ADMIN
      - NET_RAW
      - SETFCAP     # Pi-hole FTL capabilities
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pihole-net

  # =========================================================================
  # Pi-hole Backup Sidecar
  # Daily encrypted backups to NAS via restic
  # Backs up pihole config (DNS rules, blocklists, local DNS entries)
  # Schedule: 2:45 AM PYT (between HA 2:30 and Paperless 3:00)
  # =========================================================================
  pihole-backup:
    image: restic/restic:0.16.4
    env_file:
      - ../../../../shared/common.env
    container_name: pihole-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE  # Read root-owned Pi-hole config files
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "45 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - pihole-config:/data/pihole:ro
      - pihole-dnsmasq:/data/dnsmasq:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/pihole}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      BACKUP_PATH: /data
      BACKUP_TAG: pihole
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - pihole-net

volumes:
  pihole-config:
    name: pihole-config
  pihole-dnsmasq:
    name: pihole-dnsmasq

networks:
  pihole-net:
    name: pihole-net

# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# TZ=America/Asuncion
# PIHOLE_PASSWORD=your-secure-password
# HOST_IP=192.168.0.10
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Copy .env.example to .env and configure
#
# 2. Start Pi-hole:
#    docker compose up -d
#
# 3. Access web admin:
#    http://192.168.0.10/admin
#
# 4. Configure OPNsense DHCP to use this as DNS:
#    Services → DHCPv4 → LAN → DNS Server: 192.168.0.10
#
# =============================================================================
# LOCAL DNS RECORDS
# =============================================================================
#
# Add to Pi-hole Local DNS (Settings → Local DNS → DNS Records):
#
# Domain                    IP
# ------                    --
# jara.cronova.dev           192.168.0.10  # Home Assistant
# yrasema.cronova.dev        192.168.0.10  # Jellyfin
# taguato.cronova.dev        192.168.0.10  # Frigate NVR
# japysaka.cronova.dev       192.168.0.10  # Sonarr
# taanga.cronova.dev         192.168.0.10  # Radarr
# aoao.cronova.dev           192.168.0.10  # Prowlarr
# vault.cronova.dev          100.68.63.168  # Docker VM (via VPS)
# nas.cronova.dev           100.82.77.97  # NAS
# btc.cronova.dev           100.64.0.11  # RPi 4 (Start9)
#
# =============================================================================
# AD LISTS
# =============================================================================
#
# Default lists are included. Consider adding:
#   - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
#   - https://dbl.oisd.nl/
#
# =============================================================================
