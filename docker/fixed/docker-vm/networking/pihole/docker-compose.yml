# Pi-hole - DNS ad-blocking
# Fixed Homelab - Docker VM
# https://pi-hole.net/

services:
  pihole:
    image: pihole/pihole:2025.04.0
    env_file:
      - ../../../../shared/common.env
    container_name: pihole
    hostname: pihole-fixed
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=networking"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:80/tcp"   # Web admin (8053 to avoid conflict with Caddy)
    volumes:
      - pihole-config:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    environment:
      TZ: ${TZ:-America/Asuncion}
      WEBPASSWORD: ${PIHOLE_PASSWORD:?PIHOLE_PASSWORD required in .env}
      FTLCONF_LOCAL_IPV4: ${HOST_IP:-192.168.0.10}
      PIHOLE_DNS_: 1.1.1.1;9.9.9.9
      DNSSEC: "true"
      FTLCONF_dns_listeningMode: all
      QUERY_LOGGING: "true"
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pihole-net

volumes:
  pihole-config:
    name: pihole-config
  pihole-dnsmasq:
    name: pihole-dnsmasq

networks:
  pihole-net:
    name: pihole-net

# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# TZ=America/Asuncion
# PIHOLE_PASSWORD=your-secure-password
# HOST_IP=192.168.0.10
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Copy .env.example to .env and configure
#
# 2. Start Pi-hole:
#    docker compose up -d
#
# 3. Access web admin:
#    http://192.168.0.10/admin
#
# 4. Configure OPNsense DHCP to use this as DNS:
#    Services → DHCPv4 → LAN → DNS Server: 192.168.0.10
#
# =============================================================================
# LOCAL DNS RECORDS
# =============================================================================
#
# Add to Pi-hole Local DNS (Settings → Local DNS → DNS Records):
#
# Domain                    IP
# ------                    --
# jara.cronova.dev           192.168.0.10  # Home Assistant
# yrasema.cronova.dev        192.168.0.10  # Jellyfin
# taguato.cronova.dev        192.168.0.10  # Frigate NVR
# japysaka.cronova.dev       192.168.0.10  # Sonarr
# taanga.cronova.dev         192.168.0.10  # Radarr
# aoao.cronova.dev           192.168.0.10  # Prowlarr
# vault.cronova.dev          100.68.63.168  # Docker VM (via VPS)
# nas.cronova.dev           100.82.77.97  # NAS
# btc.cronova.dev           100.64.0.11  # RPi 4 (Start9)
#
# =============================================================================
# AD LISTS
# =============================================================================
#
# Default lists are included. Consider adding:
#   - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
#   - https://dbl.oisd.nl/
#
# =============================================================================
