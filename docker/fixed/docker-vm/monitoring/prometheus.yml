# vmagent Scrape Configuration
# Prometheus-compatible format for VictoriaMetrics

global:
  scrape_interval: 30s

scrape_configs:
  # =========================================================================
  # Docker VM - Node Exporter
  # =========================================================================
  - job_name: node-docker-vm
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: docker-vm

  # =========================================================================
  # NAS - Node Exporter
  # =========================================================================
  - job_name: node-nas
    static_configs:
      - targets: ['100.82.77.97:9100']
        labels:
          instance: nas

  # =========================================================================
  # VictoriaMetrics - Self-monitoring
  # =========================================================================
  - job_name: victoriametrics
    static_configs:
      - targets: ['victoriametrics:8428']
        labels:
          instance: victoriametrics

  # =========================================================================
  # vmagent - Self-monitoring
  # =========================================================================
  - job_name: vmagent
    static_configs:
      - targets: ['vmagent:8429']
        labels:
          instance: vmagent

  # =========================================================================
  # Grafana - Self-monitoring
  # =========================================================================
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: grafana

  # =========================================================================
  # cAdvisor - Docker Container Metrics
  # =========================================================================
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: docker-vm

  # =========================================================================
  # Home Assistant - Prometheus Endpoint
  # =========================================================================
  # Generate a long-lived access token in HA:
  #   Profile → Long-Lived Access Tokens → Create
  - job_name: home-assistant
    bearer_token: '<HA_LONG_LIVED_TOKEN>'
    metrics_path: /api/prometheus
    static_configs:
      - targets: ['host.docker.internal:8123']
        labels:
          instance: home-assistant
