# Monitoring Stack - VictoriaMetrics + Grafana
# Fixed Homelab - Docker VM
# Metrics collection and visualization (Papa)

services:
  # =========================================================================
  # VictoriaMetrics - Time Series Database
  # https://victoriametrics.com/
  # =========================================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.137.0
    env_file:
      - ../../../shared/common.env
    container_name: victoriametrics
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - vm-data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=90d"
      - "--httpListenAddr=:8428"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net

  # =========================================================================
  # vmagent - Metrics Scraper
  # https://docs.victoriametrics.com/vmagent/
  # =========================================================================
  vmagent:
    image: victoriametrics/vmagent:v1.137.0
    env_file:
      - ../../../shared/common.env
    container_name: vmagent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8429/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vmagent-data:/vmagentdata
    command:
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      victoriametrics:
        condition: service_healthy

  # =========================================================================
  # vmalert - Alerting Rule Evaluator
  # https://docs.victoriametrics.com/vmalert/
  # =========================================================================
  vmalert:
    image: victoriametrics/vmalert:v1.137.0
    env_file:
      - ../../../shared/common.env
    container_name: vmalert
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    volumes:
      - ./alerts.yml:/etc/vmalert/alerts.yml:ro
    command:
      - "--datasource.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--remoteWrite.url=http://victoriametrics:8428"
      - "--remoteRead.url=http://victoriametrics:8428"
      - "--rule=/etc/vmalert/alerts.yml"
      - "--evaluationInterval=30s"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net
    depends_on:
      victoriametrics:
        condition: service_healthy
      alertmanager:
        condition: service_healthy

  # =========================================================================
  # Alertmanager - Alert Routing & Deduplication
  # https://prometheus.io/docs/alerting/latest/alertmanager/
  # =========================================================================
  alertmanager:
    image: prom/alertmanager:v0.31.1
    env_file:
      - ../../../shared/common.env
    container_name: alertmanager
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./ntfy-token:/etc/alertmanager/ntfy-token:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager:9093"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net

  # =========================================================================
  # cAdvisor - Container Metrics Exporter
  # https://github.com/google/cadvisor
  # =========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.56.2
    env_file:
      - ../../../shared/common.env
    container_name: cadvisor
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,resctrl,process"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net

  # =========================================================================
  # Grafana - Visualization & Dashboards
  # https://grafana.com/
  # =========================================================================
  grafana:
    image: grafana/grafana:12.4.0
    env_file:
      - ../../../shared/common.env
    container_name: grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      GF_INSTALL_PLUGINS: victoriametrics-metrics-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://papa.cronova.dev
      # Auth proxy — Authelia handles authentication via forward_auth headers
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: Remote-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Email:Remote-Email Name:Remote-Name"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net
      - caddy-net
    depends_on:
      victoriametrics:
        condition: service_healthy

volumes:
  vm-data:
    name: vm-data
  vmagent-data:
    name: vmagent-data
  alertmanager-data:
    name: alertmanager-data
  grafana-data:
    name: grafana-data

networks:
  monitoring-net:
    name: monitoring-net
  caddy-net:
    external: true

# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. Install node_exporter on Docker VM:
#    wget https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
#    tar xzf node_exporter-*.tar.gz
#    sudo cp node_exporter-*/node_exporter /usr/local/bin/
#    sudo useradd -rs /bin/false node_exporter
#    # Create systemd service (see below)
#    sudo systemctl enable --now node_exporter
#
# 2. Install node_exporter on NAS (same process)
#
# 3. Generate HA long-lived access token:
#    HA UI → Profile → Long-Lived Access Tokens → Create
#    Add to prometheus.yml bearer_token field
#
# 4. Create .env:
#    GRAFANA_ADMIN_PASSWORD=<secure-password>
#
# 5. Create ntfy-token file for Alertmanager:
#    echo -n "tk_<your-ntfy-token>" > ntfy-token
#    Generate token: docker exec ntfy ntfy token add augusto
#
# 6. Start monitoring:
#    docker compose up -d
#
# =============================================================================
# NODE_EXPORTER SYSTEMD SERVICE
# =============================================================================
#
# /etc/systemd/system/node_exporter.service:
#
# [Unit]
# Description=Node Exporter
# After=network.target
#
# [Service]
# User=node_exporter
# ExecStart=/usr/local/bin/node_exporter
# Restart=on-failure
#
# [Install]
# WantedBy=multi-user.target
#
# =============================================================================
# DNS ENTRIES (Pi-hole)
# =============================================================================
#
# Add to Pi-hole local DNS:
#   papa.cronova.dev → 192.168.0.10
#
# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# GRAFANA_ADMIN_PASSWORD=<generate-secure-password>
#
# =============================================================================
