# Monitoring Stack - VictoriaMetrics + Grafana
# Fixed Homelab - Docker VM
# Metrics collection and visualization (Papa)

services:
  # =========================================================================
  # VictoriaMetrics - Time Series Database
  # https://victoriametrics.com/
  # =========================================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    env_file:
      - ../../../shared/common.env
    container_name: victoriametrics
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - vm-data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=90d"
      - "--httpListenAddr=:8428"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net

  # =========================================================================
  # vmagent - Metrics Scraper
  # https://docs.victoriametrics.com/vmagent/
  # =========================================================================
  vmagent:
    image: victoriametrics/vmagent:latest
    env_file:
      - ../../../shared/common.env
    container_name: vmagent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vmagent-data:/vmagentdata
    command:
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - victoriametrics

  # =========================================================================
  # Grafana - Visualization & Dashboards
  # https://grafana.com/
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    env_file:
      - ../../../shared/common.env
    container_name: grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=monitoring"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      GF_INSTALL_PLUGINS: victoriametrics-metrics-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://papa.cronova.dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring-net
    depends_on:
      - victoriametrics

volumes:
  vm-data:
    name: vm-data
  vmagent-data:
    name: vmagent-data
  grafana-data:
    name: grafana-data

networks:
  monitoring-net:
    name: monitoring-net

# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. Install node_exporter on Docker VM:
#    wget https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
#    tar xzf node_exporter-*.tar.gz
#    sudo cp node_exporter-*/node_exporter /usr/local/bin/
#    sudo useradd -rs /bin/false node_exporter
#    # Create systemd service (see below)
#    sudo systemctl enable --now node_exporter
#
# 2. Install node_exporter on NAS (same process)
#
# 3. Generate HA long-lived access token:
#    HA UI → Profile → Long-Lived Access Tokens → Create
#    Add to prometheus.yml bearer_token field
#
# 4. Create .env:
#    GRAFANA_ADMIN_PASSWORD=<secure-password>
#
# 5. Start monitoring:
#    docker compose up -d
#
# =============================================================================
# NODE_EXPORTER SYSTEMD SERVICE
# =============================================================================
#
# /etc/systemd/system/node_exporter.service:
#
# [Unit]
# Description=Node Exporter
# After=network.target
#
# [Service]
# User=node_exporter
# ExecStart=/usr/local/bin/node_exporter
# Restart=on-failure
#
# [Install]
# WantedBy=multi-user.target
#
# =============================================================================
# DNS ENTRIES (Pi-hole)
# =============================================================================
#
# Add to Pi-hole local DNS:
#   papa.cronova.dev → 192.168.0.10
#
# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# GRAFANA_ADMIN_PASSWORD=<generate-secure-password>
#
# =============================================================================
