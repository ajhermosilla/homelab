# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Reverse proxy support (Caddy)
# Trusts X-Forwarded-For headers from Docker bridge networks
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/12

# ntfy push notifications
# Extra fields (priority, tags, click, actions) passed via data in automations
notify:
  - name: ntfy_homelab
    platform: rest
    resource: https://notify.cronova.dev
    method: POST_JSON
    headers:
      Authorization: !secret ntfy_token
    data_template:
      topic: "homelab"
      title: "{{ title }}"
      message: "{{ message }}"
      priority: "{{ data.priority | default(3) | int }}"
      tags: "{{ data.tags | default('') }}"
      click: "{{ data.click | default('') }}"
      icon: "{{ data.icon | default('') }}"
      actions: "{{ data.actions | default([]) }}"
      markdown: true

# Recorder — exclude noisy Frigate entities to keep DB lean
# Frigate creates 120+ entities; FPS, CPU, and motion sensors change every few seconds
recorder:
  purge_keep_days: 7
  exclude:
    entity_globs:
      # Per-camera FPS and CPU metrics (update every ~1s)
      - sensor.*_camera_fps
      - sensor.*_detection_fps
      - sensor.*_process_fps
      - sensor.*_skipped_fps
      - sensor.*_capture_cpu_usage
      - sensor.*_detect_cpu_usage
      - sensor.*_ffmpeg_cpu_usage
      # Per-camera and per-zone object counts (update on every detection frame)
      - sensor.*_all_count
      - sensor.*_all_active_count
      - sensor.*_person_count
      - sensor.*_person_active_count
      - sensor.*_car_count
      - sensor.*_car_active_count
      - sensor.*_dog_count
      - sensor.*_dog_active_count
      - sensor.*_cat_count
      - sensor.*_cat_active_count
      # Motion binary sensors (flap constantly)
      - binary_sensor.*_motion
      # All-object occupancy (redundant with per-object)
      - binary_sensor.*_all_occupancy
      # Camera motion tuner numbers (rarely useful in history)
      - number.*_contour_area
      - number.*_threshold
    entities:
      # Global Frigate metrics (update every ~1s)
      - sensor.frigate_cpu_inference_speed
      - sensor.frigate_detection_fps
      - sensor.frigate_ov_inference_speed

# Additional dashboards
lovelace:
  mode: storage
  dashboards:
    lovelace-cameras:
      mode: yaml
      title: Cameras
      icon: mdi:cctv
      show_in_sidebar: true
      filename: cameras-dashboard.yaml
