# Automation Stack - Home Assistant + Mosquitto
# Fixed Homelab - Docker VM
# Smart home automation with MQTT

services:
  # =========================================================================
  # Home Assistant - Home Automation
  # https://www.home-assistant.io/
  # =========================================================================
  homeassistant:
    image: homeassistant/home-assistant:stable
    env_file:
      - ../../../shared/common.env
    container_name: homeassistant
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=automation"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    ports:
      - "8123:8123"
    volumes:
      - homeassistant-config:/config
    environment:
      TZ: ${TZ:-America/Asuncion}
    logging:
      driver: "json-file"
      options:
        # Larger log size for Home Assistant - integrations and automations generate verbose logs
        max-size: "20m"
        max-file: "3"
    # Note: Add device mounts if USB Zigbee/Z-Wave sticks are used:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    networks:
      - automation-net
      - mqtt-net  # For MQTT communication
    depends_on:
      mosquitto:
        condition: service_healthy

  # =========================================================================
  # Mosquitto - MQTT Broker
  # https://mosquitto.org/
  # =========================================================================
  mosquitto:
    image: eclipse-mosquitto:2.0
    env_file:
      - ../../../shared/common.env
    container_name: mosquitto
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID  # Required for privilege dropping in entrypoint
      - SETUID
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=automation"
      - "com.cronova.critical=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3", "-u", "frigate", "-P", "${FRIGATE_MQTT_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    ports:
      - "127.0.0.1:1883:1883"  # MQTT — Docker network only, debug access via localhost
      - "127.0.0.1:9001:9001"  # WebSocket — debug access via localhost
    volumes:
      - mosquitto-config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - automation-net
      - mqtt-net  # Shared network for Frigate and other MQTT clients

  # =========================================================================
  # Home Assistant Backup Sidecar
  # Daily encrypted backups to NAS via restic
  # =========================================================================
  homeassistant-backup:
    image: restic/restic:0.16.4
    env_file:
      - ../../../shared/common.env
    container_name: homeassistant-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    init: true  # Proper signal handling for cron daemon
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "30 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - homeassistant-config:/data:ro
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/restic-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/homeassistant}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      BACKUP_PATH: /data
      BACKUP_TAG: homeassistant
      BACKUP_EXCLUDE: "*.log,*.db-shm,*.db-wal,home-assistant_v2.db"
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - automation-net
    depends_on:
      - homeassistant

volumes:
  homeassistant-config:
    name: homeassistant-config
  mosquitto-config:
    name: mosquitto-config
  mosquitto-data:
    name: mosquitto-data
  mosquitto-log:
    name: mosquitto-log

networks:
  automation-net:
    name: automation-net
  mqtt-net:
    name: mqtt-net

# =============================================================================
# MOSQUITTO CONFIGURATION
# =============================================================================
#
# Create mosquitto.conf in this directory:
#
# listener 1883
# allow_anonymous false
# password_file /mosquitto/config/password.txt
#
# # WebSocket support (optional)
# listener 9001
# protocol websockets
#
# persistence true
# persistence_location /mosquitto/data/
#
# log_dest file /mosquitto/log/mosquitto.log
# log_dest stdout
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Create mosquitto.conf (see above)
#
# 2. Start services:
#    docker compose up -d
#
# 3. Create Mosquitto user:
#    docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/password.txt homeassistant
#    docker exec -it mosquitto mosquitto_passwd -b /mosquitto/config/password.txt frigate frigate-password
#    docker compose restart mosquitto
#
# 4. Access Home Assistant:
#    http://192.168.0.10:8123
#    - Create admin account on first visit
#    - Complete onboarding wizard
#
# =============================================================================
# HOME ASSISTANT INTEGRATIONS
# =============================================================================
#
# MQTT (for Frigate):
#   Settings → Devices & Services → Add Integration → MQTT
#   Broker: mosquitto (or 192.168.0.10)
#   Port: 1883
#   Username: homeassistant
#   Password: <your-password>
#
# Frigate:
#   Settings → Devices & Services → Add Integration → Frigate
#   URL: http://192.168.0.10:5000
#
# =============================================================================
# FRIGATE ↔ HOME ASSISTANT ↔ MQTT
# =============================================================================
#
# Frigate → MQTT → Home Assistant
#
# 1. Frigate publishes events to MQTT:
#    - frigate/events (new detections)
#    - frigate/camera_name/person (object detection)
#    - frigate/stats (system stats)
#
# 2. Home Assistant subscribes to MQTT topics
#
# 3. Create automations:
#    - Send notification on person detection
#    - Turn on lights when motion detected
#    - Record clips when camera detects person
#
# =============================================================================
# EXAMPLE AUTOMATION (configuration.yaml)
# =============================================================================
#
# automation:
#   - alias: "Notify on Person Detection"
#     trigger:
#       platform: mqtt
#       topic: "frigate/events"
#     condition:
#       condition: template
#       value_template: "{{ trigger.payload_json.after.label == 'person' }}"
#     action:
#       - service: notify.mobile_app
#         data:
#           message: "Person detected on {{ trigger.payload_json.after.camera }}"
#           data:
#             image: "http://192.168.0.10:5000/api/events/{{ trigger.payload_json.after.id }}/snapshot.jpg"
#
# =============================================================================
