- id: frigate_person_front_door
  alias: "Frigate: Person at Front Door"
  description: "Send rich ntfy notification when an unknown person is detected in the driveway zone"
  trigger:
    - platform: mqtt
      topic: frigate/events
      payload: "update"
      value_template: "{{ value_json.type }}"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.after.camera == 'front_door'
           and trigger.payload_json.after.label == 'person'
           and 'driveway' in trigger.payload_json.after.current_zones
           and (trigger.payload_json.after.sub_label is none
                or trigger.payload_json.after.sub_label[0] not in
                ['augusto', 'andre']) }}
  action:
    - service: notify.ntfy_homelab
      data:
        title: >
          {% if trigger.payload_json.after.sub_label is not none %}
          {{ trigger.payload_json.after.sub_label[0] | title }} in Driveway
          {% else %}
          Unknown Person in Driveway
          {% endif %}
        message: >
          **Front Door** — {{ now().strftime('%H:%M') }}

          Person detected in the driveway zone.
          Event ID: `{{ trigger.payload_json.after.id }}`
        data:
          priority: 4
          tags: "rotating_light,camera"
          click: "https://taguato.cronova.dev/review?id={{ trigger.payload_json.after.id }}"
          icon: "https://docs.frigate.video/img/frigate.png"
          actions:
            - action: view
              label: Open Frigate
              url: "https://taguato.cronova.dev"

