- id: frigate_person_front_door
  alias: "Frigate: Person at Front Door"
  description: "Send ntfy notification when an unknown person is detected in the driveway zone"
  trigger:
    - platform: mqtt
      topic: frigate/events
      payload: "update"
      value_template: "{{ value_json.type }}"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.after.camera == 'front_door'
           and trigger.payload_json.after.label == 'person'
           and 'driveway' in trigger.payload_json.after.current_zones
           and (trigger.payload_json.after.sub_label is none
                or trigger.payload_json.after.sub_label[0] not in
                ['augusto', 'andre']) }}
  action:
    - service: notify.ntfy_homelab
      data:
        title: "Unknown Person in Driveway"
        message: >
          {% if trigger.payload_json.after.sub_label is not none %}
          {{ trigger.payload_json.after.sub_label[0] }} detected in driveway at {{ now().strftime('%H:%M') }}
          {% else %}
          Unknown person detected in driveway at {{ now().strftime('%H:%M') }}
          {% endif %}

