- id: frigate_person_front_door
  alias: "Frigate: Person at Front Door"
  description: "Send ntfy notification when a person is detected at the front door"
  trigger:
    - platform: mqtt
      topic: frigate/events
      payload: "new"
      value_template: "{{ value_json.type }}"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.after.camera == 'front_door'
           and trigger.payload_json.after.label == 'person' }}
  action:
    - service: notify.ntfy_homelab
      data:
        title: "Person at Front Door"
        message: "Person detected at {{ now().strftime('%H:%M') }}"

