# Mosquitto MQTT Broker Configuration
# https://mosquitto.org/man/mosquitto-conf-5.html
#
# Used by: Home Assistant, Frigate
# Port: 1883 (MQTT), 9001 (WebSocket)

# =============================================================================
# LISTENERS
# =============================================================================

# MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (optional - for web clients)
listener 9001
protocol websockets

# =============================================================================
# AUTHENTICATION
# =============================================================================

# Disable anonymous access
allow_anonymous false

# Password file location
# Create with: docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/password.txt <user>
password_file /mosquitto/config/password.txt

# =============================================================================
# PERSISTENCE
# =============================================================================

persistence true
persistence_location /mosquitto/data/

# =============================================================================
# LOGGING
# =============================================================================

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Start Mosquitto:
#    docker compose up -d mosquitto
#
# 2. Create users:
#    # Home Assistant user
#    docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/password.txt homeassistant
#
#    # Frigate user (use -b for non-interactive)
#    docker exec -it mosquitto mosquitto_passwd -b /mosquitto/config/password.txt frigate <password>
#
# 3. Restart to apply:
#    docker compose restart mosquitto
#
# 4. Test connection:
#    docker exec -it mosquitto mosquitto_sub -h localhost -u homeassistant -P <password> -t '#' -v
#
# =============================================================================
# USERS
# =============================================================================
#
# | User          | Purpose                    |
# |---------------|----------------------------|
# | homeassistant | Home Assistant integration |
# | frigate       | Frigate NVR events         |
#
# =============================================================================
