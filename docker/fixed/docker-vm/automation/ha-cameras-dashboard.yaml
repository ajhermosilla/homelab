title: Cameras
views:
  - title: Live Feeds
    path: live
    icon: mdi:cctv
    cards:
      - type: vertical-stack
        cards:
          - type: picture-entity
            entity: camera.front_door
            name: Front Door
            show_state: false
            show_name: true
            camera_view: live
          - type: glance
            entities:
              - entity: binary_sensor.front_door_person_occupancy
                name: Person
              - entity: binary_sensor.front_door_car_occupancy
                name: Car
              - entity: binary_sensor.front_door_motion
                name: Motion
              - entity: switch.front_door_detect
                name: Detection

      - type: vertical-stack
        cards:
          - type: picture-entity
            entity: camera.back_yard
            name: Back Yard
            show_state: false
            show_name: true
            camera_view: live
          - type: glance
            entities:
              - entity: binary_sensor.back_yard_person_occupancy
                name: Person
              - entity: binary_sensor.back_yard_dog_occupancy
                name: Dog
              - entity: binary_sensor.back_yard_cat_occupancy
                name: Cat
              - entity: binary_sensor.back_yard_motion
                name: Motion

      - type: vertical-stack
        cards:
          - type: picture-entity
            entity: camera.indoor
            name: Indoor
            show_state: false
            show_name: true
            camera_view: live
          - type: glance
            entities:
              - entity: binary_sensor.indoor_person_occupancy
                name: Person
              - entity: binary_sensor.indoor_motion
                name: Motion
              - entity: switch.indoor_detect
                name: Detection
              - entity: switch.indoor_recordings
                name: Recording

  - title: Detection Status
    path: detection
    icon: mdi:motion-sensor
    cards:
      - type: entities
        title: Person Counts
        entities:
          - entity: sensor.front_door_person_count
            name: Front Door
          - entity: sensor.back_yard_person_count
            name: Back Yard
          - entity: sensor.indoor_person_count
            name: Indoor
          - entity: sensor.front_door_car_count
            name: Cars (Front)
          - entity: sensor.back_yard_dog_count
            name: Dogs (Back)
          - entity: sensor.back_yard_cat_count
            name: Cats (Back)

      - type: entities
        title: Last Detection
        entities:
          - entity: image.front_door_person
            name: Front Door Person
          - entity: image.back_yard_person
            name: Back Yard Person
          - entity: image.indoor_person
            name: Indoor Person
          - entity: image.front_door_car
            name: Front Door Car

      - type: entities
        title: Camera Controls
        entities:
          - entity: switch.front_door_detect
          - entity: switch.front_door_recordings
          - entity: switch.back_yard_detect
          - entity: switch.back_yard_recordings
          - entity: switch.indoor_detect
          - entity: switch.indoor_recordings

      - type: entities
        title: Frigate System
        entities:
          - entity: sensor.frigate_status
          - entity: sensor.frigate_cpu_inference_speed
          - entity: sensor.frigate_detection_fps
          - entity: sensor.frigate_uptime
