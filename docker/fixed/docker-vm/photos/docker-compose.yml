# Photos Stack - Immich
# Fixed Homelab - Docker VM
# Self-hosted photo management with ML (Vera)

services:
  # =========================================================================
  # Immich Server
  # https://immich.app/
  # =========================================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    env_file:
      - ../../../shared/common.env
    container_name: immich-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=photos"
      - "com.cronova.critical=true"
      - "com.cronova.backup=true"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    ports:
      - "127.0.0.1:2283:2283"
    volumes:
      - ${UPLOAD_LOCATION:-immich-upload}:/usr/src/app/upload
      - /mnt/nas/photos:/mnt/external:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich-db
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: immich-valkey
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - photos-net
      - caddy-net
    depends_on:
      immich-db:
        condition: service_healthy
      immich-valkey:
        condition: service_started

  # =========================================================================
  # Immich Machine Learning
  # Face recognition, object detection, smart search
  # =========================================================================
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    env_file:
      - ../../../shared/common.env
    container_name: immich-ml
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=photos"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    volumes:
      - immich-ml-cache:/cache
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    environment:
      MACHINE_LEARNING_WORKERS: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - photos-net

  # =========================================================================
  # Valkey - Redis-compatible cache for Immich
  # =========================================================================
  immich-valkey:
    image: valkey/valkey:8-bookworm
    env_file:
      - ../../../shared/common.env
    container_name: immich-valkey
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=photos"
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - photos-net

  # =========================================================================
  # PostgreSQL with VectorChord - Vector search for Immich
  # =========================================================================
  immich-db:
    image: ghcr.io/immich-app/postgres:17-vectorchord0.5.3
    env_file:
      - ../../../shared/common.env
    container_name: immich-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=photos"
      - "com.cronova.backup=true"
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    volumes:
      - immich-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB:-immich}"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - photos-net

  # =========================================================================
  # Immich Database Backup Sidecar
  # Daily pg_dump + restic backup to NAS
  # Photos are on NAS already — this backs up metadata, albums, face data
  # =========================================================================
  immich-backup:
    image: postgres:17-alpine
    env_file:
      - ../../../shared/common.env
    container_name: immich-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "com.cronova.environment=fixed"
      - "com.cronova.category=backup"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    init: true
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache restic >/dev/null 2>&1
        echo "15 3 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    volumes:
      - ${HOMELAB_ROOT:-/opt/homelab/repo}/docker/shared/backup/immich-db-backup.sh:/backup.sh:ro
    environment:
      TZ: ${TZ:-America/Asuncion}
      PGHOST: immich-db
      PGUSER: ${DB_USERNAME:-immich}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_DATABASE_NAME:-immich}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-rest:http://${RESTIC_USER}:${RESTIC_PASS}@192.168.0.12:8000/${RESTIC_USER}/immich}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      KEEP_DAILY: "7"
      KEEP_WEEKLY: "4"
      KEEP_MONTHLY: "12"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - photos-net
    depends_on:
      immich-db:
        condition: service_healthy

volumes:
  immich-upload:
    name: immich-upload
  immich-ml-cache:
    name: immich-ml-cache
  immich-db-data:
    name: immich-db-data

networks:
  photos-net:
    name: photos-net
  caddy-net:
    external: true

# =============================================================================
# PREREQUISITES
# =============================================================================
#
# 1. NFS mount from NAS for photo storage:
#    sudo apt install nfs-common
#    sudo mkdir -p /mnt/nas/photos
#    sudo mount -t nfs 192.168.0.12:/srv/photos /mnt/nas/photos
#
# 2. Add to /etc/fstab for persistence:
#    192.168.0.12:/srv/photos /mnt/nas/photos nfs defaults 0 0
#
# 3. Create NFS export on NAS:
#    Add to /etc/exports: /srv/photos 192.168.0.10(rw,sync,no_subtree_check)
#    exportfs -ra
#
# =============================================================================
# ENVIRONMENT VARIABLES (.env)
# =============================================================================
#
# Copy .env.example to .env and configure:
#   DB_PASSWORD=<generate-secure-password>
#   UPLOAD_LOCATION=/mnt/nas/immich-upload  # or use default named volume
#
# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# 1. Set up NFS mount (see prerequisites)
# 2. Create .env from .env.example
# 3. docker compose up -d
# 4. Access: https://vera.cronova.dev
# 5. Create admin account on first login
# 6. Add external library: /mnt/external (read-only NAS photos)
#
# =============================================================================
# RAM CONSIDERATIONS
# =============================================================================
#
# Immich adds ~4.9GB in resource limits:
#   - immich-server: 2G
#   - immich-ml: 2G
#   - immich-db: 512M
#   - immich-valkey: 128M
#   - immich-backup: 256M
#
# Actual usage is typically much lower (Docker overcommits).
# Monitor with `docker stats` after deployment.
#
# If RAM pressure occurs:
#   1. Reduce ML workers or disable ML temporarily
#   2. Increase Docker VM RAM in Proxmox (requires VM stop/start)
#
# =============================================================================
# DNS ENTRIES (Pi-hole)
# =============================================================================
#
# Add to Pi-hole local DNS:
#   vera.cronova.dev → 192.168.0.10
#
# =============================================================================
