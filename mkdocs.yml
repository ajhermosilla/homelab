site_name: Homelab — Augusto Hermosilla
site_description: Infrastructure-as-code for a self-hosted homelab
site_author: Augusto Hermosilla
site_url: https://docs.cronova.dev/

repo_url: https://github.com/ajhermosilla/homelab
repo_name: ajhermosilla/homelab

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_excerpt: required
      archive: true
      categories: true
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date

nav:
  - Home: README.md
  - Blog:
      - blog/index.md
  - Architecture:
